<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaakavStocks | מעקב מניות</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Heebo', 'Arial Hebrew', sans-serif;
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-muted: #666;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-hover: 0 6px 24px rgba(0,0,0,0.14);
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.2s ease;

      /* Category colors */
      --stocks:  #ef5350;
      --indices: #1976d2;
      --currencies: #2e7d32;
      --bonds: #7b1fa2;

      /* Price colors */
      --up: #1b8a3c;
      --up-bg: #e8f5e9;
      --down: #c62828;
      --down-bg: #ffebee;
      --neutral: #555;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      direction: rtl;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      background: linear-gradient(135deg, #1a237e 0%, #283593 40%, #4527a0 100%);
      color: #fff;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 16px rgba(26,35,126,0.35);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar-logo {
      font-size: 1.8rem;
      line-height: 1;
    }

    .toolbar-title {
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .toolbar-subtitle {
      font-size: 0.7rem;
      opacity: 0.75;
      margin-top: 1px;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-status {
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.85;
      line-height: 1.5;
    }

    .countdown-bar {
      width: 90px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      margin-top: 3px;
      overflow: hidden;
    }

    .countdown-fill {
      height: 100%;
      background: #80cbc4;
      border-radius: 2px;
      transition: width 1s linear;
    }

    .btn-toolbar {
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.45);
      color: #fff;
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-toolbar:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-1px);
    }

    .btn-add {
      background: #00c853;
      border-color: #00c853;
      color: #fff;
    }

    .btn-add:hover { background: #00b248; }

    /* ── Main Content ────────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── Empty State ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.4rem; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 0.95rem; }

    /* ── Category Section ────────────────────────────────────── */
    .category-section {
      margin-bottom: 32px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .category-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .category-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .category-count {
      background: rgba(0,0,0,0.07);
      border-radius: 10px;
      padding: 2px 9px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ── Stocks Grid ─────────────────────────────────────────── */
    .stocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    /* ── Stock Card ──────────────────────────────────────────── */
    .stock-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 16px 14px;
      border-right: 5px solid transparent;
      position: relative;
      transition: box-shadow var(--transition), transform var(--transition);
      overflow: hidden;
    }

    .stock-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .stock-card.cat-stocks   { border-right-color: var(--stocks); }
    .stock-card.cat-indices  { border-right-color: var(--indices); }
    .stock-card.cat-currencies { border-right-color: var(--currencies); }
    .stock-card.cat-bonds    { border-right-color: var(--bonds); }

    /* Flash animation on price update */
    @keyframes flash-up   { 0%,100%{background:transparent} 30%{background:#c8f5d7} }
    @keyframes flash-down { 0%,100%{background:transparent} 30%{background:#ffd6d6} }
    .stock-card.flash-up   { animation: flash-up 0.9s ease; }
    .stock-card.flash-down { animation: flash-down 0.9s ease; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .card-symbol {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .card-name {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.3;
      max-width: 140px;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color var(--transition);
      line-height: 1;
      flex-shrink: 0;
    }

    .btn-remove:hover { color: #e53935; }

    .card-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      direction: ltr;
      text-align: right;
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      direction: ltr;
    }

    .badge-up   { background: var(--up-bg);   color: var(--up); }
    .badge-down { background: var(--down-bg);  color: var(--down); }
    .badge-neutral { background: #f0f0f0; color: var(--neutral); }

    .badge-label {
      font-size: 0.68rem;
      font-weight: 500;
      opacity: 0.75;
      direction: rtl;
    }

    .card-premarket {
      margin-top: 8px;
      padding: 6px 10px;
      background: #fff8e1;
      border-radius: var(--radius-sm);
      border: 1px solid #ffe082;
      font-size: 0.78rem;
      color: #5d4037;
      direction: ltr;
      text-align: right;
    }

    .card-premarket-label {
      font-size: 0.7rem;
      color: #8d6e63;
      direction: rtl;
      margin-bottom: 2px;
    }

    .card-loading {
      text-align: center;
      padding: 20px 0;
      color: #bbb;
      font-size: 0.85rem;
    }

    /* ── Error Banner ────────────────────────────────────────── */
    .error-banner {
      background: #ffebee;
      border: 1px solid #ef9a9a;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #c62828;
      font-size: 0.88rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .error-banner button {
      background: #c62828;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-family: var(--font);
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      backdrop-filter: blur(3px);
    }

    .modal-overlay.hidden { display: none; }

    .modal-box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { transform: scale(0.92) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text);
      transition: border-color var(--transition);
      background: #fafafa;
      direction: ltr;
      text-align: right;
    }

    select.form-control { direction: rtl; text-align: right; }

    .form-control:focus {
      outline: none;
      border-color: #5c6bc0;
      background: #fff;
    }

    .validation-msg {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.83rem;
      font-weight: 500;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .validation-msg.checking { background: #e3f2fd; color: #1565c0; }
    .validation-msg.valid    { background: #e8f5e9; color: #1b5e20; }
    .validation-msg.invalid  { background: #ffebee; color: #b71c1c; }
    .validation-msg.empty    { background: transparent; }

    .modal-hint {
      font-size: 0.75rem;
      color: #999;
      margin-top: 5px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-save {
      flex: 1;
      background: linear-gradient(135deg, #3949ab, #5c6bc0);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-save:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(57,73,171,0.4); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-cancel {
      background: #f0f0f0;
      color: var(--text-muted);
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-cancel:hover { background: #e0e0e0; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(21,101,192,0.3);
      border-top-color: #1565c0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .stocks-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      main { padding: 16px 12px; }
      .card-price { font-size: 1.2rem; }
    }

    @media (max-width: 400px) {
      .stocks-grid { grid-template-columns: 1fr; }
    }

    /* ── Filter select (combobox) ─────────────────────────────── */
    .filter-select {
      font-family: var(--font);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 20px;
      border: 2px solid #1976d2;
      background: #fff;
      color: #1a237e;
      cursor: pointer;
      direction: rtl;
      min-width: 170px;
    }
    .filter-select:focus { outline: none; border-color: #4527a0; }

    /* ── שם מניה מתחת לסמל (מוסתר בדסקטופ) ─────────────────── */
    .col-name-sub { display: none; font-size: 0.68em; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; margin-top: 2px; }
    .ytd-label, .pre-label { display: none; font-size: 0.75em; color: #888; font-weight: 500; }
    .cat-short    { display: none; }
    .col-break    { display: none; }

    /* ── Mobile ─────────────────────────────────────────────────  */
    @media (max-width: 768px) {
      /* Toolbar */
      .toolbar { height: auto; padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
      .toolbar-status { display: none; }
      .toolbar-actions { gap: 8px; }
      .btn-toolbar { font-size: 0.78rem; padding: 5px 11px; }

      /* Controls row */
      .controls-row { flex-wrap: wrap; padding: 8px 12px; gap: 8px; }
      .summary-bar { gap: 12px; font-size: 0.78rem; }

      /* Panel */
      .panel-market { padding: 0 10px 6px; }

    }

    /* ── פלאפון בלבד: 2-row table layout ──────────────────────── */
    @media (max-width: 480px) {
      .panel-market { padding: 0 6px 6px; }

      .market-table thead { display: none; }
      .market-table, .market-table tbody { display: block; }
      .market-table tr.mrow {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        padding: 8px 10px;
        border-bottom: 2px solid #eee;
        gap: 4px 10px;
      }
      .market-table tr.mrow td {
        display: block;
        padding: 0;
        border: none;
        white-space: nowrap;
      }
      /* Row 1 */
      .col-symbol { order: 1; flex: 1 1 auto; }
      .col-cat    { order: 2; }
      .col-price  { order: 3; font-weight: 700; }
      /* Flex line break */
      .col-break  { order: 4; display: block !important; flex-basis: 100%; height: 0; }
      /* Row 2 */
      .col-change { order: 5; font-size: 0.82rem; }
      .col-pre    { order: 6; font-size: 0.82rem; }
      .col-ytd    { order: 7; font-size: 0.82rem; }
      .col-btn    { order: 8; margin-right: auto; }
      /* Hidden */
      .col-time, .col-name { display: none !important; }
      .col-name-sub { display: block; }
      .cat-full  { display: none; }
      .cat-short { display: inline; }
      .ytd-label, .pre-label { display: inline; }
    }

    /* ── Market Panel ────────────────────────────────────────── */
    .panel-market {
      flex: 1;
      min-height: 0;
      padding: 0 20px 8px;
      display: flex;
      flex-direction: column;
    }

    .market-table-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      border: 2px solid #90caf9;
      border-radius: 12px;
    }

    .market-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
      direction: rtl;
    }

    .market-table thead tr {
      background: #e3f2fd;
    }

    .market-table thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .market-table th {
      padding: 10px 14px;
      font-weight: 700;
      color: #1a237e;
      text-align: right;
      white-space: nowrap;
      background: #e3f2fd;
    }

    .market-table th:last-child { text-align: center; width: 40px; }

    .market-table td {
      padding: 9px 14px;
      border-top: 1px solid #e0e0e0;
      white-space: nowrap;
    }

    /* Row group colors */
    .mrow-us        td { background: #fff5f7; }
    .mrow-il        td { background: #f1f8e9; }
    .mrow-crypto    td { background: #ede7f6; }
    .mrow-tech      td { background: #fffde7; }
    .mrow-watchlist  td { background: #fafafa; }
    .mrow-watch      td { background: #e0f7fa; }
    .mrow-il-stocks  td { background: #fff8e1; }
    .mrow-commodity  td { background: #f5e6d3; }

    .market-table tr:hover td { filter: brightness(0.96); }

    /* Column alignment */
    .col-price, .col-change, .col-pre, .col-ytd { direction: ltr; text-align: right; }
    .col-time   { color: var(--text-muted); font-size: 0.82rem; }
    .col-name   { font-weight: 600; }
    .col-symbol { font-weight: 700; direction: ltr; text-align: right; }

    /* Align numeric headers to match right-aligned content */
    .market-table th:nth-child(5),
    .market-table th:nth-child(6),
    .market-table th:nth-child(7),
    .market-table th:nth-child(8) { text-align: right; }

    /* Colors */
    .col-change.up,  .col-pre.up,  .col-ytd.up   { color: var(--up);   font-weight: 600; }
    .col-change.down,.col-pre.down,.col-ytd.down  { color: var(--down); font-weight: 600; }
    .col-change.neutral,.col-pre.neutral,.col-ytd.neutral { color: var(--text-muted); }

    /* Remove row button */
    .btn-remove-row {
      background: none;
      border: none;
      color: #ccc;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color var(--transition);
    }
    .btn-remove-row:hover { color: #e53935; }
    .col-btn { text-align: center; }

    .market-cat-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.73rem;
      font-weight: 600;
      border: 1px solid;
      white-space: nowrap;
    }

    .market-footer {
      text-align: left;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
      padding: 0 2px;
    }

    /* ── Filter Bar ──────────────────────────────────────────── */
    /* ── Controls row (filter + summary) ─────────────────────── */
    .controls-row {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      gap: 12px;
      border-bottom: 1px solid #e3f2fd;
      background: #fff;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Summary bar ─────────────────────────────────────────── */
    .summary-bar {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
    }

    .summary-item .sum-label {
      color: #666;
      font-weight: 500;
    }

    .summary-item .sum-val { font-weight: 700; font-size: 0.88rem; direction: ltr; unicode-bidi: embed; }
    .summary-item .sum-val.up   { color: var(--up); }
    .summary-item .sum-val.down { color: var(--down); }
    .summary-item .sum-val.neutral { color: #888; }
    .summary-item + .summary-item::before { content: '|'; color: #ccc; margin-left: 4px; }

    .filter-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-left: 4px;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 20px;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid #ddd;
      transition: all 0.15s ease;
      white-space: nowrap;
      background: #f0f0f0;
      color: #888;
    }

    .filter-chip:hover {
      filter: brightness(0.95);
      transform: translateY(-1px);
    }

    .filter-chip.active {
      background: var(--chip-color, #666);
      color: #fff;
      border-color: var(--chip-color, #666);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .filter-chip-all {
      background: #f0f0f0;
      color: #555;
      border-color: #ccc;
    }

    .filter-chip-all.all-active {
      background: #37474f;
      color: #fff;
      border-color: #37474f;
    }

    /* ── Dark Mode ───────────────────────────────────────────────── */
    body.dark {
      --bg: #0f1117;
      --card-bg: #1a1d27;
      --text: #e8eaf6;
      --text-muted: #9e9e9e;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --shadow-hover: 0 6px 24px rgba(0,0,0,0.6);
      --up-bg: #1b3a2a;

// Migrate existing localStorage data to Firestore (runs once)
async function migrateFromLocalStorage() {
  const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
  if (!raw) return;
  try {
    const items = JSON.parse(raw);
    if (!items || items.length === 0) return;
    const snap = await watchlistCol.limit(1).get();
    if (!snap.empty) return; // Firestore already has data
    const batch = db.batch();
    items.forEach(item => {
      const id = item.id || genId();
      batch.set(watchlistCol.doc(id), { ...item, id });
    });
    await batch.commit();
    localStorage.removeItem(CONFIG.STORAGE_KEY);
    console.log(`Migrated ${items.length} items to Firestore`);
  } catch (e) {
    console.warn('Migration skipped:', e.message);
  }
}

function initFirestoreListener() {
  watchlistCol.onSnapshot(snapshot => {
    const prevSymbols = new Set(STATE.watchlist.map(i => i.symbol));
    STATE.watchlist = [];
    snapshot.forEach(d => STATE.watchlist.push(d.data()));
    STATE.watchlist.sort((a, b) => new Date(a.addedAt) - new Date(b.addedAt));

    renderUnifiedTable();

    // Fetch data for symbols newly added from another device
    const newSymbols = STATE.watchlist
      .filter(i => !prevSymbols.has(i.symbol) && !STATE.marketData[i.symbol])
      .map(i => i.symbol);
    if (newSymbols.length > 0) {
      fetchAllSymbols(newSymbols).then(data => {
        if (data.length > 0) { updateMarketData(data); renderUnifiedTable(); }
      });
    }
  }, err => showError('Firebase: ' + err.message));
}

function genId() {
  return Math.random().toString(36).substr(2, 9) + Date.now().toString(36);

/* ══════════════════════════════════════════════════════════════
   API
══════════════════════════════════════════════════════════════ */
async function proxyFetch(yahooUrl) {
  // Try direct first — Yahoo often allows requests from localhost
  try {
    const res = await fetch(yahooUrl, { signal: AbortSignal.timeout(6000) });
    if (res.ok) return await res.json();
  } catch (e) { /* fall through */ }

  // Try proxies
  for (const proxy of CONFIG.PROXIES) {
    try {
      const res = await fetch(proxy.build(yahooUrl), { signal: AbortSignal.timeout(9000) });
      if (!res.ok) continue;
      const json = await res.json();
      return proxy.raw ? json : JSON.parse(json.contents);
    } catch (e) {
      continue;
    }
  }
  throw new Error('All proxies failed');
}

function parseChartResponse(symbol, data) {
  const result = data?.chart?.result?.[0];
  if (!result) return null;
  const meta  = result.meta;
  const price = meta.regularMarketPrice;
  if (price == null) return null;

  const timestamps = result.timestamp || [];
  const rawCloses  = result.indicators?.quote?.[0]?.close || [];

  // Daily change logic:
  // Market OPEN  → (regularMarketPrice - yesterday_close) / yesterday_close
  // Market CLOSED → (yesterday_close - day_before_close) / day_before_close = yesterday's final change
  const todayStartTs = new Date(new Date().toISOString().slice(0, 10)).getTime() / 1000;
  const regTime = meta.regularMarketTime || 0;
  const priceIsFromToday = regTime >= todayStartTs;

  // Collect last 3 valid bars (most recent first)
  const recentBars = [];
  for (let i = timestamps.length - 1; i >= 0 && recentBars.length < 3; i--) {
    if (rawCloses[i] != null) recentBars.push({ ts: timestamps[i], close: rawCloses[i] });
  }

  let change = null;
  if (priceIsFromToday) {
    // Market open: live price vs yesterday's bar
    const prevBar = recentBars.find(b => b.ts < todayStartTs);
    if (prevBar) change = (price - prevBar.close) / prevBar.close * 100;
  } else {
    // Market closed: bar[0]=yesterday bar[1]=day-before → yesterday's final change
    if (recentBars.length >= 2) {
      change = (recentBars[0].close - recentBars[1].close) / recentBars[1].close * 100;
    }
  }

  // YTD: chartPreviousClose = Dec 31 close of previous year
  const ytdBase = meta.chartPreviousClose;
  const ytd = ytdBase ? ((price - ytdBase) / ytdBase * 100) : null;
  if (ytd != null) STATE.ytdCache[symbol] = ytd;
  return {
    symbol,
    name: meta.longName || meta.shortName || symbol,
    price, change,
    preMarketPrice:  meta.preMarketPrice         || null,
    preMarketChange: meta.preMarketChangePercent  || null,
    currency:    meta.currency    || '',
    marketState: meta.marketState || '',
  };
}

// Fetch price + YTD for a single symbol using v8 chart
async function fetchSymbolData(symbol) {
  const params = '?interval=1d&range=ytd';

  // 1. Try local Python proxy (works when using start.bat)
  try {
    const res = await fetch(`/api/chart/${encodeURIComponent(symbol)}${params}`,
      { signal: AbortSignal.timeout(10000) });
    if (res.ok) return parseChartResponse(symbol, await res.json());
  } catch (e) { /* fall through */ }

  // 2. Try external proxies
  const yahooUrl = CONFIG.YAHOO_CHART + encodeURIComponent(symbol) + params;
  const data = await proxyFetch(yahooUrl);
  return parseChartResponse(symbol, data);
}

// Fetch pre/after-market data for a single symbol (1m bars after regularMarketTime)
async function fetchPreMarketData(symbol) {
  const params = '?interval=1m&range=1d&includePrePost=true';
  let data = null;
  try {
    const res = await fetch(`/api/chart/${encodeURIComponent(symbol)}${params}`,
      { signal: AbortSignal.timeout(10000) });
    if (res.ok) data = await res.json();
  } catch (e) {}
  if (!data) return null; // local proxy only — external proxies don't support 1m interval
  const result = data?.chart?.result?.[0];
  if (!result) return null;
  const meta       = result.meta;
  const price      = meta.regularMarketPrice;
  const regTime    = meta.regularMarketTime || 0;
  const timestamps = result.timestamp || [];
  const closes     = result.indicators?.quote?.[0]?.close || [];
  // Walk backwards: find last bar AFTER regularMarketTime (= extended hours)
  for (let i = timestamps.length - 1; i >= 0; i--) {
    if (timestamps[i] > regTime && closes[i] != null) {
      if (price == null) return null;
      const prePrice = closes[i];
      return { preMarketChange: ((prePrice - price) / price * 100) };
    }
  }
  return null;
}

// Fetch all symbols in parallel (gracefully skips failures); also fetches pre-market
async function fetchAllSymbols(symbols) {
  const results = await Promise.allSettled(symbols.map(fetchSymbolData));
  const data = results
    .filter(r => r.status === 'fulfilled' && r.value != null)
    .map(r => r.value);

  // Parallel pre-market fetch for each successfully loaded symbol
  const preResults = await Promise.allSettled(data.map(d => fetchPreMarketData(d.symbol)));
  preResults.forEach((r, i) => {
    if (r.status === 'fulfilled' && r.value) {
      data[i].preMarketChange = r.value.preMarketChange;
    }
  });

  return data;
}

async function validateSymbol(symbol) {
  try {
    const data = await fetchSymbolData(symbol);
    if (data && data.price != null) {
      return { valid: true, name: data.name, price: data.price, currency: data.currency };
    }
    return { valid: false };
  } catch (e) {
    return { valid: false, error: true };
  }
}

/* ══════════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════════ */
function fmtPrice(price, currency) {
  if (price == null) return '—';
  const sym = currency === 'ILS' ? '₪' : (currency === 'USD' ? '$' : (currency || ''));
  return sym + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}

function fmtPct(val) {
  if (val == null) return '—';
  const sign = val >= 0 ? '+' : '';
  return sign + val.toFixed(2) + '%';
}

function changeClass(val) {
  if (val == null) return 'badge-neutral';
  return val >= 0 ? 'badge-up' : 'badge-down';
}

function changeArrow(val) {
  if (val == null) return '';
  return val >= 0 ? '▲' : '▼';
}

/* Build unified asset list: fixed market symbols + user watchlist */
function getAllAssets() {
  const marketSymbols = new Set(Object.keys(MARKET_META));
  const assets = [];

  // Fixed market symbols (always present)
  Object.keys(MARKET_META).forEach(symbol => {
    const meta = MARKET_META[symbol];
    const q = STATE.lastMarketQuotes.find(r => r.symbol === symbol) || {};
    const price = q.price ?? null;
    const prevClose = STATE.marketPrevClose[symbol] ?? null;
    const ytd = (prevClose != null && price != null)
      ? ((price - prevClose) / prevClose * 100)
      : (STATE.ytdCache[symbol] ?? null);
    assets.push({
      symbol,
      name: meta.name,
      category: meta.category,
      price,
      change: q.change ?? null,
      preChange: q.preChange ?? null,
      time: q.time ?? null,
      ytd,
      group: meta.group,
      isWatchlist: false,
    });
  });

  // User watchlist (skip duplicates already in market panel)
  // Sorted: by category order (CONFIG.CATEGORIES), then by symbol A-Z
  const watchlistAssets = [];
  STATE.watchlist.forEach(item => {
    if (marketSymbols.has(item.symbol)) return;
    const d = STATE.marketData[item.symbol] || {};
    watchlistAssets.push({
      symbol: item.symbol,
      name: d.name || item.symbol,
      category: item.category,
      price: d.price ?? null,
      change: d.change ?? null,
      preChange: d.preMarketChange ?? null,
      time: null,
      ytd: STATE.ytdCache[item.symbol] ?? null,
      group: item.category === 'מעקב' ? 'watch' : item.category === 'מניות ישראל' ? 'il-stocks' : item.symbol.endsWith('=F') ? 'commodity' : 'watchlist',
      isWatchlist: true,
    });
  });
  watchlistAssets.sort((a, b) => {
    const ci = c => CONFIG.CATEGORIES.indexOf(c);
    if (ci(a.category) !== ci(b.category)) return ci(a.category) - ci(b.category);
    return a.symbol.localeCompare(b.symbol);
  });
  assets.push(...watchlistAssets);

  return assets;
}


function renderUnifiedTable() {
  const tbody = document.getElementById('market-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  const assets      = sortAssets(getAllAssets());
  const activeFilters = STATE.activeFilters;
  updateSortIndicators();
  let count = 0;

  assets.forEach(asset => {
    if (activeFilters.length > 0 && !activeFilters.includes(asset.category)) return;
    count++;

    const change    = fmtMarketPct(asset.change);
    const pre       = fmtMarketPct(asset.preChange);
    const catColor  = CONFIG.CAT_COLOR[asset.category] || '#999';
    const timeTxt   = asset.time ? fmtMarketTime(asset.time) : '—';
    const ytdVal    = asset.ytd;
    const ytdCls    = ytdVal == null ? 'neutral' : (ytdVal >= 0 ? 'up' : 'down');
    const ytdTxt    = ytdVal != null ? ytdVal.toFixed(2) + '%' : '—';
    const removeBtn = asset.isWatchlist
      ? `<button class="btn-remove-row" data-symbol="${escHtml(asset.symbol)}" title="הסר">✕</button>`
      : '';

    const catShort = CONFIG.CAT_SHORT[asset.category] || asset.category;
    const catIcon  = CONFIG.CAT_ICON[asset.category] ? CONFIG.CAT_ICON[asset.category] + ' ' : '';
    const tr = document.createElement('tr');
    tr.className = `mrow mrow-${asset.group}`;
    tr.innerHTML = `
      <td class="col-time">${timeTxt}</td>
      <td class="col-symbol">
        <div>${escHtml(asset.symbol)}</div>
        <div class="col-name-sub">${escHtml(asset.name)}</div>
      </td>
      <td class="col-name">${escHtml(asset.name)}</td>
      <td class="col-cat"><span class="market-cat-badge" style="background:${catColor}22;color:${catColor};border-color:${catColor}55"><span class="cat-full">${catIcon}${escHtml(asset.category || '')}</span><span class="cat-short">${catIcon}${escHtml(catShort)}</span></span></td>
      <td class="col-price">${fmtMarketPrice(asset.price, asset.symbol)}</td>
      <td class="col-break"></td>
      <td class="col-change ${change.cls}">${change.text}</td>
      <td class="col-pre ${pre.cls}"><span class="pre-label">PRE </span>${pre.text}</td>
      <td class="col-ytd ${ytdCls}"><span class="ytd-label">Y2D </span>${ytdTxt}</td>
      <td class="col-btn">${removeBtn}</td>
    `;
    tbody.appendChild(tr);
  });

  if (count === 0) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:20px;color:#aaa">אין נכסים בקטגוריה הנבחרת</td></tr>`;
  }

  const el = document.getElementById('market-updated');
  if (el) el.textContent = new Date().toLocaleTimeString('he-IL');
}

/* Keep renderAll as alias so existing call sites work */
function renderAll() { renderUnifiedTable(); }

function renderCard(item) {
  const d = STATE.marketData[item.symbol] || {};
  const ytd = STATE.ytdCache[item.symbol];
  const catClass = CONFIG.CAT_CLASS[item.category] || '';

  const card = document.createElement('div');
  card.className = `stock-card ${catClass}`;
  card.dataset.symbol = item.symbol;

  const hasPremarket = d.preMarketPrice != null && d.marketState === 'PRE';
  const priceDisplay = d.price != null
    ? fmtPrice(d.price, d.currency)
    : '<span style="color:#ccc;font-size:0.9rem">טוען...</span>';

  const ytdHtml = ytd != null
    ? `<span class="badge ${changeClass(ytd)}">${changeArrow(ytd)} ${fmtPct(ytd)} <span class="badge-label">YTD</span></span>`
    : '';

  const changeHtml = d.change != null
    ? `<span class="badge ${changeClass(d.change)}">${changeArrow(d.change)} ${fmtPct(d.change)} <span class="badge-label">יום</span></span>`
    : '';

  const premarketHtml = hasPremarket
    ? `<div class="card-premarket">
         <div class="card-premarket-label">🌅 טרום-פתיחה</div>
         ${fmtPrice(d.preMarketPrice, d.currency)}
         <span style="margin-right:6px;font-size:0.8rem;color:${d.preMarketChange >= 0 ? 'var(--up)' : 'var(--down)'}">${fmtPct(d.preMarketChange)}</span>
       </div>`
    : '';

  card.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-symbol">${escHtml(item.symbol)}</div>
        <div class="card-name">${escHtml(d.name || '')}</div>
      </div>
      <button class="btn-remove" data-symbol="${escHtml(item.symbol)}" title="הסר">✕</button>
    </div>
    <div class="card-price">${priceDisplay}</div>
    <div class="card-badges">
      ${changeHtml}
      ${ytdHtml}
    </div>
    ${premarketHtml}
  `;

  return card;
}

function updateMarketData(dataArr) {
  dataArr.forEach(d => {
    const prev = STATE.marketData[d.symbol];
    STATE.marketData[d.symbol] = {
      name:           d.name,
      price:          d.price,
      change:         d.change,
      preMarketPrice: d.preMarketPrice,
      preMarketChange: d.preMarketChange,
      currency:       d.currency,
      marketState:    d.marketState,
    };
    if (prev && prev.price != null && d.price != null && prev.price !== d.price) {
      flashCard(d.symbol, d.price > prev.price ? 'flash-up' : 'flash-down');
    }
  });
}

function flashCard(symbol, cls) {
  const card = document.querySelector(`.stock-card[data-symbol="${symbol}"]`);
  if (!card) return;
  card.classList.remove('flash-up', 'flash-down');
  void card.offsetWidth; // reflow
  card.classList.add(cls);
  setTimeout(() => card.classList.remove(cls), 900);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════════════
   REFRESH & COUNTDOWN
══════════════════════════════════════════════════════════════ */
async function refreshQuotes() {
  refreshMarket(); // refresh market panel data
  const symbols = STATE.watchlist.map(i => i.symbol);
  if (symbols.length === 0) { updateTimestamp(); return; }
  clearError();
  const data = await fetchAllSymbols(symbols);
  if (data.length === 0) {
    showError('שגיאת רשת — לא ניתן לעדכן נתונים. לחץ "רענן" לנסות שוב.');
    return;
  }
  updateMarketData(data);
  renderUnifiedTable();
  updateTimestamp();
}

function updateTimestamp() {
  const el = document.getElementById('refresh-time');
  if (!el) return;
  const now = new Date();
  el.textContent = `עודכן: ${now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
}

function startAutoRefresh() {
  stopAutoRefresh();
  STATE.countdown = 60;
  updateCountdownBar(60);

  STATE.countdownTimer = setInterval(() => {
    STATE.countdown = Math.max(0, STATE.countdown - 1);
    updateCountdownBar(STATE.countdown);
  }, 1000);

  STATE.refreshTimer = setInterval(async () => {
    STATE.countdown = 60;
    await refreshQuotes();
    STATE.countdown = 60;
    updateCountdownBar(60);
  }, CONFIG.REFRESH_MS);
}

function stopAutoRefresh() {
  clearInterval(STATE.refreshTimer);
  clearInterval(STATE.countdownTimer);
}

function updateCountdownBar(secs) {
  const fill = document.getElementById('countdown-fill');
  if (fill) fill.style.width = (secs / 60 * 100) + '%';
}

let _validSymbolData = null;

function openModal() {
  _validSymbolData = null;
  document.getElementById('input-symbol').value = '';
  document.getElementById('input-category').value = 'מניות חול';
  setValidationMsg('', '');
  document.getElementById('btn-save').disabled = true;
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('input-symbol').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function setValidationMsg(type, html) {
  const el = document.getElementById('validation-msg');
  el.className = `validation-msg ${type}`;
  el.innerHTML = html;
}

let _validateDebounce = null;

document.getElementById('input-symbol').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
  _validSymbolData = null;
  document.getElementById('btn-save').disabled = true;

  const sym = this.value.trim();
  if (!sym) { setValidationMsg('empty', ''); return; }

  clearTimeout(_validateDebounce);
  setValidationMsg('checking', '<span class="spinner"></span> מאמת סמל...');

  _validateDebounce = setTimeout(async () => {
    const result = await validateSymbol(sym);
    if (result.valid) {
      _validSymbolData = result;
      setValidationMsg('valid', `✓ ${escHtml(result.name)} — ${fmtPrice(result.price, result.currency)}`);
      document.getElementById('btn-save').disabled = false;
    } else if (result.error) {
      setValidationMsg('invalid', '⚠️ שגיאת רשת — לא ניתן לאמת. ניתן לשמור בכל זאת.');
      // Allow save despite network error (user's risk)
      _validSymbolData = { valid: true, name: sym };
      document.getElementById('btn-save').disabled = false;
    } else {
      setValidationMsg('invalid', '✗ הסמל לא נמצא. בדוק את האיות.');
    }
  }, 700);
});

document.getElementById('btn-save').addEventListener('click', handleSave);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-open-modal').addEventListener('click', openModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('input-symbol').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !document.getElementById('btn-save').disabled) handleSave();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

async function handleSave() {
  const symbol = document.getElementById('input-symbol').value.trim().toUpperCase();
  const category = document.getElementById('input-category').value;
  if (!symbol || !_validSymbolData) return;
  if (!category) { setValidationMsg('invalid', '⚠️ יש לבחור קטגוריה.'); return; }

  // Check for duplicates
  if (STATE.watchlist.some(i => i.symbol === symbol)) {
    setValidationMsg('invalid', '⚠️ הסמל כבר קיים ברשימה.');
    return;
  }

  const newItem = { id: genId(), symbol, category, addedAt: new Date().toISOString() };
  closeModal();
  await addItemToFirestore(newItem); // onSnapshot will update STATE.watchlist

  // Fetch data for new symbol immediately
  try {
    const [data, preData] = await Promise.all([
      fetchSymbolData(symbol),
      fetchPreMarketData(symbol),
    ]);
    if (data) {
      if (preData) data.preMarketChange = preData.preMarketChange;
      updateMarketData([data]);
      renderUnifiedTable();
    }
  } catch (e) { /* show anyway */ }
}

/* ══════════════════════════════════════════════════════════════
   REMOVE STOCK — event delegation on unified table
══════════════════════════════════════════════════════════════ */
document.getElementById('market-tbody').addEventListener('click', function(e) {
  const btn = e.target.closest('.btn-remove-row');
  if (!btn) return;
  const symbol = btn.dataset.symbol;
  if (!symbol) return;
  if (!confirm(`הסר את ${symbol} מהרשימה?`)) return;
  const item = STATE.watchlist.find(i => i.symbol === symbol);
  if (item) removeItemFromFirestore(item.id); // onSnapshot updates STATE.watchlist
  delete STATE.marketData[symbol];
  delete STATE.ytdCache[symbol];
});

   MANUAL REFRESH
══════════════════════════════════════════════════════════════ */
async function manualRefresh() {
  await refreshQuotes();
  startAutoRefresh(); // reset countdown
}

document.getElementById('btn-manual-refresh').addEventListener('click', manualRefresh);

const MARKET_META = {
  'QQQ':     { name: 'נאסד"ק 100', group: 'us',     category: 'מדדים ותעודות סל' },
  'SPY':     { name: 'S&P 500',    group: 'us',     category: 'מדדים ותעודות סל' },
  'DIA':     { name: 'דאו ג\'ונס', group: 'us',     category: 'מדדים ותעודות סל' },
  'IWM':     { name: 'ראסל 2000',  group: 'us',     category: 'מדדים ותעודות סל' },
  'TA35.TA': { name: 'ת"א 35',     group: 'il',     category: 'מדדים ותעודות סל' },
  'TA90.TA': { name: 'ת"א 90',     group: 'il',     category: 'מדדים ותעודות סל' },
  'BTC-USD': { name: 'ביטקוין',    group: 'crypto', category: 'מטבעות' },
  'ETH-USD': { name: 'איתריום',    group: 'crypto', category: 'מטבעות' },
};

function fmtMarketPrice(price, symbol) {
  if (price == null) return '—';
  const isCrypto = symbol === 'BTC-USD' || symbol === 'ETH-USD';
  if (isCrypto) return '$' + price.toLocaleString('en-US', { maximumFractionDigits: 0 });
  return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtMarketPct(val) {
  if (val == null) return { text: '—', cls: 'neutral' };
  return {
    text: val.toFixed(2) + '%',
    cls:  val >= 0 ? 'up' : 'down',
  };
}

function fmtMarketTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  const now = new Date();
  const isToday = d.getFullYear() === now.getFullYear()
               && d.getMonth()    === now.getMonth()
               && d.getDate()     === now.getDate();
  const timeStr = d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  return isToday ? timeStr : 'אמש ' + timeStr;
}

function renderMarketTable(quotes) {
  const tbody = document.getElementById('market-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  const activeFilters = STATE.activeFilters;

  quotes.forEach(q => {
    const meta = MARKET_META[q.symbol] || { name: q.symbol, group: 'us', category: '' };

    // Skip row if its category is filtered out
    if (activeFilters.length > 0 && meta.category && !activeFilters.includes(meta.category)) return;

    const change    = fmtMarketPct(q.change);
    const pre       = fmtMarketPct(q.preChange);
    const catColor  = CONFIG.CAT_COLOR[meta.category] || '#999';

    const tr = document.createElement('tr');
    tr.className = `mrow mrow-${meta.group}`;
    tr.innerHTML = `
      <td class="col-time">${fmtMarketTime(q.time)}</td>
      <td class="col-name">${escHtml(meta.name)}</td>
      <td><span class="market-cat-badge" style="background:${catColor}22;color:${catColor};border-color:${catColor}55">${escHtml(meta.category || '')}</span></td>
      <td class="col-price">${fmtMarketPrice(q.price, q.symbol)}</td>
      <td class="col-change ${change.cls}">${change.text}</td>
      <td class="col-pre ${pre.cls}">${pre.text}</td>
      <td class="col-btn"><button class="btn-expand">▼</button></td>
    `;
    tbody.appendChild(tr);
  });

  const el = document.getElementById('market-updated');
  if (el) el.textContent = new Date().toLocaleTimeString('he-IL');
}

// Fetch Dec-31 prevClose for one market symbol (for YTD calc). Called once per session.
async function fetchMarketSymbolYTD(symbol) {
  try {
    const res = await fetch(`/proxy/market/chart?symbol=${encodeURIComponent(symbol)}`,
      { signal: AbortSignal.timeout(10000) });
    if (!res.ok) return;
    const data = await res.json();
    if (data.prevClose != null) STATE.marketPrevClose[symbol] = data.prevClose;
  } catch (e) {}
}

async function refreshMarket() {
  try {
    const res = await fetch('/proxy/market', { signal: AbortSignal.timeout(20000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const quotes = await res.json();
    STATE.lastMarketQuotes = quotes;
    renderUnifiedTable();

    // Fetch YTD prevClose for symbols not yet cached (once per session)
    const needYTD = Object.keys(MARKET_META).filter(s => STATE.marketPrevClose[s] == null);
    if (needYTD.length > 0) {
      await Promise.allSettled(needYTD.map(fetchMarketSymbolYTD));
      renderUnifiedTable(); // re-render now that YTD is available
    }
  } catch (e) {
    const tbody = document.getElementById('market-tbody');
    if (tbody && STATE.lastMarketQuotes.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:14px;color:#e53935;font-size:0.85rem">
        ⚠️ שגיאה בטעינת נתוני שוק — הפעל מחדש את start.bat<br>
        <small style="color:#999">${e.message}</small>
      </td></tr>`;
    }
  }
}

/* ══════════════════════════════════════════════════════════════
   SORT
══════════════════════════════════════════════════════════════ */
function sortAssets(assets) {
  const { col, dir } = STATE.sort;
  if (!col) return assets;
  const m = dir === 'asc' ? 1 : -1;
  return [...assets].sort((a, b) => {
    let av, bv;
    switch (col) {
      case 'time':     av = a.time ?? 0;                              bv = b.time ?? 0;                              break;
      case 'symbol':   av = a.symbol || '';                           bv = b.symbol || '';                           break;
      case 'name':     av = a.name || '';                             bv = b.name || '';                             break;
      case 'category': av = CONFIG.CATEGORIES.indexOf(a.category);   bv = CONFIG.CATEGORIES.indexOf(b.category);   break;
      case 'price':    av = a.price ?? -Infinity;                     bv = b.price ?? -Infinity;                     break;
      case 'change':   av = a.change ?? -Infinity;                    bv = b.change ?? -Infinity;                    break;
      case 'pre':      av = a.preChange ?? -Infinity;                 bv = b.preChange ?? -Infinity;                 break;
      case 'ytd':      av = a.ytd ?? -Infinity;                       bv = b.ytd ?? -Infinity;                       break;
      default: return 0;
    }
    if (typeof av === 'string') return m * av.localeCompare(bv);
    return m * (av - bv);
  });
}

function initSortHeaders() {
  document.querySelectorAll('.market-table th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (STATE.sort.col === col) {
        STATE.sort.dir = STATE.sort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        STATE.sort.col = col;
        STATE.sort.dir = 'asc';
      }
      renderUnifiedTable();
    });
  });
}

function updateSortIndicators() {
  document.querySelectorAll('.market-table th[data-col]').forEach(th => {
    th.querySelectorAll('.sort-indicator').forEach(el => el.remove());
    if (th.dataset.col === STATE.sort.col) {
      const span = document.createElement('span');
      span.className = 'sort-indicator';
      span.textContent = STATE.sort.dir === 'asc' ? ' ▲' : ' ▼';
      th.appendChild(span);
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   CHART MODAL
══════════════════════════════════════════════════════════════ */
let _chartInstance = null;
let _chartSymbol   = null;
let _chartName     = null;

function closeChartModal() {
  document.getElementById('chart-overlay').classList.add('hidden');
  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
}

async function openChartModal(symbol, name, interval, range) {
  _chartSymbol = symbol;
  _chartName   = name;
  interval = interval || '5m';
  range    = range    || '1d';

  document.getElementById('chart-overlay').classList.remove('hidden');
  document.getElementById('chart-symbol').textContent = symbol;
  document.getElementById('chart-name').textContent = name && name !== symbol ? name : '';
  document.getElementById('chart-stats').innerHTML = '<span class="chart-stat"><span class="spinner"></span> טוען...</span>';

  // Sync active button
  document.querySelectorAll('.chart-range-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.interval === interval && btn.dataset.range === range);
  });

  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }

  try {
    const params = `?interval=${interval}&range=${range}`;
    let data = null;
    try {
      const res = await fetch(`/api/chart/${encodeURIComponent(symbol)}${params}`,
        { signal: AbortSignal.timeout(10000) });
      if (res.ok) data = await res.json();
    } catch(e) {}
    if (!data) {
      data = await proxyFetch(CONFIG.YAHOO_CHART + encodeURIComponent(symbol) + params);
    }

    const result = data?.chart?.result?.[0];
    if (!result) throw new Error('אין נתונים');

    const timestamps = result.timestamp || [];
    const closes = result.indicators?.quote?.[0]?.close || [];
    const pairs = timestamps.map((t, i) => ({ t, c: closes[i] })).filter(p => p.c != null);
    if (pairs.length === 0) throw new Error('אין נקודות נתונים');

    const isIntraday = (range === '1d' || range === '5d');
    const labels = pairs.map(p => {
      const d = new Date(p.t * 1000);
      if (isIntraday) return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    });
    const values    = pairs.map(p => p.c);
    const minVal    = Math.min(...values);
    const maxVal    = Math.max(...values);
    const first     = values[0];
    const last      = values[values.length - 1];
    const chgPct    = ((last - first) / first * 100);
    const isUp      = chgPct >= 0;
    const lineColor = isUp ? '#1b8a3c' : '#c62828';
    const fmt = v => v.toLocaleString('en-US', { maximumFractionDigits: 2 });

    const rangeLabel = { '1d':'היום', '5d':'5 ימים', '1mo':'חודש', 'ytd':'מתחילת השנה', '1y':'שנה' }[range] || range;
    const hiLoLabel  = range === '1y' ? '52W' : rangeLabel;

    document.getElementById('chart-stats').innerHTML = `
      <span class="chart-stat">${hiLoLabel} גבוה: <strong style="color:#1b8a3c">${fmt(maxVal)}</strong></span>
      <span class="chart-stat">${hiLoLabel} נמוך: <strong style="color:#c62828">${fmt(minVal)}</strong></span>
      <span class="chart-stat">${rangeLabel}: <strong style="color:${lineColor}">${isUp?'+':''}${chgPct.toFixed(2)}%</strong></span>
    `;

    const isDark    = document.body.classList.contains('dark');
    const tickColor = isDark ? '#9e9e9e' : '#666';
    const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
    const maxTicks  = isIntraday ? 6 : 8;

    const ctx = document.getElementById('chart-canvas').getContext('2d');
    _chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: lineColor,
          backgroundColor: lineColor + '22',
          borderWidth: 2,
          pointRadius: 0,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.parsed.y) } }
        },
        scales: {
          x: { ticks: { color: tickColor, maxTicksLimit: maxTicks, maxRotation: 0 }, grid: { color: gridColor } },
          y: { position: 'left', ticks: { color: tickColor, maxTicksLimit: 6 }, grid: { color: gridColor } }
        },
        interaction: { mode: 'index', intersect: false },
      }
    });
  } catch(e) {
    document.getElementById('chart-stats').innerHTML = `<span style="color:#e53935">שגיאה: ${escHtml(e.message)}</span>`;
  }
}

document.getElementById('chart-close').addEventListener('click', closeChartModal);
document.getElementById('chart-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeChartModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChartModal(); });

// Range buttons
document.getElementById('chart-ranges').addEventListener('click', function(e) {
  const btn = e.target.closest('.chart-range-btn');
  if (!btn || !_chartSymbol) return;
  openChartModal(_chartSymbol, _chartName, btn.dataset.interval, btn.dataset.range);
});

// Row click → open chart
document.getElementById('market-tbody').addEventListener('click', function(e) {
  if (e.target.closest('.btn-remove-row')) return;
  const tr = e.target.closest('tr.mrow');
  if (!tr) return;
  const symbolEl = tr.querySelector('.col-symbol div');
  const nameEl   = tr.querySelector('.col-name');
  const symbol   = symbolEl?.textContent?.trim();
  const name     = nameEl?.textContent?.trim();
  if (symbol) openChartModal(symbol, name);
});

/* ══════════════════════════════════════════════════════════════
   FILTER BAR
══════════════════════════════════════════════════════════════ */
function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  if (!bar) return;
  bar.innerHTML = '';

  const label = document.createElement('span');
  label.className = 'filter-label';
  label.textContent = 'סינון:';
  bar.appendChild(label);

  const sel = document.createElement('select');
  sel.className = 'filter-select';

  const allActive = CONFIG.CATEGORIES.every(c => STATE.activeFilters.includes(c));
  const optAll = document.createElement('option');
  optAll.value = '__all__';
  optAll.textContent = '📋 הכל';
  if (allActive) optAll.selected = true;
  sel.appendChild(optAll);

  CONFIG.CATEGORIES.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = CONFIG.CAT_ICON[cat] + ' ' + cat;
    if (!allActive && STATE.activeFilters.includes(cat)) opt.selected = true;
    sel.appendChild(opt);
  });

  sel.addEventListener('change', () => {
    STATE.activeFilters = sel.value === '__all__' ? [...CONFIG.CATEGORIES] : [sel.value];
    renderUnifiedTable();
  });

  bar.appendChild(sel);
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
async function init() {
  initDarkMode();
  initSortHeaders();
  await migrateFromLocalStorage(); // one-time localStorage→Firestore migration
  initFirestoreListener();         // real-time sync + data fetch handled inside listener
  renderFilterBar();
  renderUnifiedTable();
  updateTimestamp();
  refreshMarket();
  startAutoRefresh();
}

init();
</script>
