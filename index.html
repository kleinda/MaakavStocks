<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaakavStocks | מעקב מניות</title>
  <!-- v20260421 -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Heebo', 'Arial Hebrew', sans-serif;
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-muted: #666;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-hover: 0 6px 24px rgba(0,0,0,0.14);
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.2s ease;

      /* Category colors */
      --stocks:  #ef5350;
      --indices: #1976d2;
      --currencies: #2e7d32;
      --bonds: #7b1fa2;

      /* Price colors */
      --up: #1b8a3c;
      --up-bg: #e8f5e9;
      --down: #c62828;
      --down-bg: #ffebee;
      --neutral: #555;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      direction: rtl;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      background: linear-gradient(135deg, #1a237e 0%, #283593 40%, #4527a0 100%);
      color: #fff;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 16px rgba(26,35,126,0.35);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar-logo {
      font-size: 1.8rem;
      line-height: 1;
    }

    .toolbar-title {
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .toolbar-subtitle {
      font-size: 0.7rem;
      opacity: 0.75;
      margin-top: 1px;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-status {
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.85;
      line-height: 1.5;
    }

    .countdown-bar {
      width: 90px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      margin-top: 3px;
      overflow: hidden;
    }

    .countdown-fill {
      height: 100%;
      background: #80cbc4;
      border-radius: 2px;
      transition: width 1s linear;
    }

    .btn-toolbar {
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.45);
      color: #fff;
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-toolbar:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-1px);
    }

    .btn-add {
      background: #00c853;
      border-color: #00c853;
      color: #fff;
    }

    .btn-add:hover { background: #00b248; }

    /* ── Main Content ────────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── Empty State ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.4rem; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 0.95rem; }

    /* ── Category Section ────────────────────────────────────── */
    .category-section {
      margin-bottom: 32px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .category-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .category-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .category-count {
      background: rgba(0,0,0,0.07);
      border-radius: 10px;
      padding: 2px 9px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ── Stocks Grid ─────────────────────────────────────────── */
    .stocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    /* ── Stock Card ──────────────────────────────────────────── */
    .stock-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 16px 14px;
      border-right: 5px solid transparent;
      position: relative;
      transition: box-shadow var(--transition), transform var(--transition);
      overflow: hidden;
    }

    .stock-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .stock-card.cat-stocks   { border-right-color: var(--stocks); }
    .stock-card.cat-indices  { border-right-color: var(--indices); }
    .stock-card.cat-currencies { border-right-color: var(--currencies); }
    .stock-card.cat-bonds    { border-right-color: var(--bonds); }

    /* Flash animation on price update */
    @keyframes flash-up   { 0%,100%{background:transparent} 30%{background:#c8f5d7} }
    @keyframes flash-down { 0%,100%{background:transparent} 30%{background:#ffd6d6} }
    .stock-card.flash-up   { animation: flash-up 0.9s ease; }
    .stock-card.flash-down { animation: flash-down 0.9s ease; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .card-symbol {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .card-name {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.3;
      max-width: 140px;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color var(--transition);
      line-height: 1;
      flex-shrink: 0;
    }

    .btn-remove:hover { color: #e53935; }

    .card-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      direction: ltr;
      text-align: right;
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      direction: ltr;
    }

    .badge-up   { background: var(--up-bg);   color: var(--up); }
    .badge-down { background: var(--down-bg);  color: var(--down); }
    .badge-neutral { background: #f0f0f0; color: var(--neutral); }

    .badge-label {
      font-size: 0.68rem;
      font-weight: 500;
      opacity: 0.75;
      direction: rtl;
    }

    .card-premarket {
      margin-top: 8px;
      padding: 6px 10px;
      background: #fff8e1;
      border-radius: var(--radius-sm);
      border: 1px solid #ffe082;
      font-size: 0.78rem;
      color: #5d4037;
      direction: ltr;
      text-align: right;
    }

    .card-premarket-label {
      font-size: 0.7rem;
      color: #8d6e63;
      direction: rtl;
      margin-bottom: 2px;
    }

    .card-loading {
      text-align: center;
      padding: 20px 0;
      color: #bbb;
      font-size: 0.85rem;
    }

    /* ── Error Banner ────────────────────────────────────────── */
    .error-banner {
      background: #ffebee;
      border: 1px solid #ef9a9a;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #c62828;
      font-size: 0.88rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .error-banner button {
      background: #c62828;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-family: var(--font);
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      backdrop-filter: blur(3px);
    }

    .modal-overlay.hidden { display: none; }

    .modal-box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { transform: scale(0.92) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text);
      transition: border-color var(--transition);
      background: #fafafa;
      direction: ltr;
      text-align: right;
    }

    select.form-control { direction: rtl; text-align: right; }

    .form-control:focus {
      outline: none;
      border-color: #5c6bc0;
      background: #fff;
    }

    .validation-msg {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.83rem;
      font-weight: 500;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .validation-msg.checking { background: #e3f2fd; color: #1565c0; }
    .validation-msg.valid    { background: #e8f5e9; color: #1b5e20; }
    .validation-msg.invalid  { background: #ffebee; color: #b71c1c; }
    .validation-msg.empty    { background: transparent; }

    .modal-hint {
      font-size: 0.75rem;
      color: #999;
      margin-top: 5px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-save {
      flex: 1;
      background: linear-gradient(135deg, #3949ab, #5c6bc0);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-save:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(57,73,171,0.4); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-cancel {
      background: #f0f0f0;
      color: var(--text-muted);
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-cancel:hover { background: #e0e0e0; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(21,101,192,0.3);
      border-top-color: #1565c0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .stocks-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      main { padding: 16px 12px; }
      .card-price { font-size: 1.2rem; }
    }

    @media (max-width: 400px) {
      .stocks-grid { grid-template-columns: 1fr; }
    }

    /* ── Filter select (combobox) ─────────────────────────────── */
    .filter-select {
      font-family: var(--font);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 20px;
      border: 2px solid #1976d2;
      background: #fff;
      color: #1a237e;
      cursor: pointer;
      direction: rtl;
      min-width: 170px;
    }
    .filter-select:focus { outline: none; border-color: #4527a0; }

    /* ── שם מניה מתחת לסמל (מוסתר בדסקטופ) ─────────────────── */
    .col-name-sub { display: none; font-size: 0.68em; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; margin-top: 2px; }
    .ytd-label, .pre-label { display: none; font-size: 0.75em; color: #888; font-weight: 500; }
    .cat-short    { display: none; }
    .col-break    { display: none; }

    /* ── Mobile ─────────────────────────────────────────────────  */
    @media (max-width: 768px) {
      /* Toolbar — brand right, actions left (RTL), no overflow */
      .toolbar { height: auto; padding: 5px 10px; flex-wrap: nowrap; gap: 6px; }
      .toolbar-brand { flex-shrink: 0; gap: 5px; }
      .toolbar-logo { display: none; }
      .toolbar-title { font-size: 0.9rem; }
      .toolbar-subtitle { display: none; }
      .toolbar-status { display: none; }
      .toolbar-actions { flex: 1; justify-content: flex-start; gap: 5px; }
      .btn-toolbar { font-size: 0.74rem; padding: 4px 8px; }
      .btn-add { font-size: 0.74rem; padding: 4px 9px; }
      #btn-manual-refresh .refresh-text { display: none; }

      /* Controls row — two compact selects on one line */
      .controls-row { padding: 4px 8px; gap: 5px; flex-wrap: nowrap; align-items: center; }
      .filter-bar { flex: 0 0 auto; max-width: 48%; gap: 4px; }
      .filter-label { display: none; }
      .filter-select { font-size: 0.78rem; padding: 3px 4px; min-width: 0 !important; max-width: 100%; width: 100%; }
      .filter-bar .filter-select { width: 120px; max-width: 120px; }
      .jump-bar { flex: 1; min-width: 0; margin-right: 0; }
      .jump-bar .filter-select { max-width: 100%; width: 100%; }

      /* Modal fits screen */
      .modal-box { padding: 16px 14px 14px; border-radius: 14px; }
      .modal-overlay { padding: 10px; }

      /* Panel */
      .panel-market { padding: 0 4px 4px; }
    }

    /* ── פלאפון בלבד: 2-row table layout ──────────────────────── */
    @media (max-width: 480px) {
      .panel-market { padding: 0 6px 6px; }

      .market-table thead { display: none; }
      .market-table, .market-table tbody { display: block; }
      .market-table tr.mrow {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        padding: 8px 10px;
        border-bottom: 2px solid #eee;
        gap: 4px 10px;
      }
      .market-table tr.mrow td {
        display: block;
        padding: 0;
        border: none;
        white-space: nowrap;
      }
      /* Row 1 */
      .col-symbol { order: 1; flex: 1 1 auto; }
      .col-cat    { order: 2; }
      .col-price  { order: 3; font-weight: 700; }
      /* Flex line break */
      .col-break  { order: 4; display: block !important; flex-basis: 100%; height: 0; }
      /* Row 2 */
      .col-change { order: 5; font-size: 0.82rem; }
      .col-pre    { order: 6; font-size: 0.82rem; }
      .col-ytd    { order: 7; font-size: 0.82rem; }
      .col-btn    { order: 8; margin-right: auto; }
      /* Hidden */
      .col-time, .col-name { display: none !important; }
      .col-name-sub { display: block; }
      .cat-full  { display: none; }
      .cat-short { display: inline; }
      .ytd-label, .pre-label { display: inline; }
    }

    /* ── Research mode: override mobile flex-table ── */
    @media (max-width: 480px) {
      /* Force proper table layout — overrides the block/flex from above */
      .market-table.research-mode          { display: table !important; width: 100% !important; }
      .market-table.research-mode tbody    { display: table-row-group !important; }
      .market-table.research-mode thead    { display: table-header-group !important; }
      .market-table.research-mode tr       { display: table-row !important; flex-wrap: unset !important; padding: 0 !important; }
      .market-table.research-mode td,
      .market-table.research-mode th       { display: table-cell !important; white-space: normal !important; padding: 6px 6px !important; border: none; }
      /* Tighter column widths */
      .market-table.research-mode .col-research-sym { width: 68px !important; min-width: 0 !important; font-size: 0.8rem; }
      .market-table.research-mode .col-price        { width: 58px !important; font-size: 0.8rem; }
      .market-table.research-mode .col-research-ma  { width: 90px !important; font-size: 0.75rem; }
      .market-table.research-mode .col-research-earn{ width: 80px !important; font-size: 0.75rem; }
      /* Hide news on mobile — AI summary covers it */
      .market-table.research-mode .col-research-news { display: none !important; }
      /* Keep AI button column */
      .market-table.research-mode .col-research-ai  { width: 36px !important; text-align: center !important; }
      /* AI summary row */
      .ai-summary-cell { white-space: normal !important; font-size: 0.8rem; padding: 8px 10px !important; }
    }

    /* ── Market Panel ────────────────────────────────────────── */
    .panel-market {
      flex: 1;
      min-height: 0;
      padding: 0 20px 8px;
      display: flex;
      flex-direction: column;
    }

    .market-table-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      border: 2px solid #90caf9;
      border-radius: 12px;
    }

    .market-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
      direction: rtl;
    }

    .market-table thead tr {
      background: #e3f2fd;
    }

    .market-table thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .market-table th {
      padding: 10px 14px;
      font-weight: 700;
      color: #1a237e;
      text-align: right;
      white-space: nowrap;
      background: #e3f2fd;
    }

    .market-table th:last-child { text-align: center; width: 40px; }

    .market-table td {
      padding: 9px 14px;
      border-top: 1px solid #e0e0e0;
      white-space: nowrap;
    }

    /* Row group colors */
    .mrow-us        td { background: #fff5f7; }
    .mrow-il        td { background: #f1f8e9; }
    .mrow-crypto    td { background: #ede7f6; }
    .mrow-forex     td { background: #e8f5e9; }
    .mrow-tech      td { background: #fffde7; }
    .mrow-watchlist  td { background: #fafafa; }
    .mrow-watch      td { background: #e0f7fa; }
    .mrow-il-stocks  td { background: #fff8e1; }
    .mrow-commodity  td { background: #f5e6d3; }

    .market-table tr:hover td { filter: brightness(0.96); }

    /* Column alignment */
    .col-price, .col-change, .col-pre, .col-ytd { direction: ltr; text-align: right; }
    .col-time   { color: var(--text-muted); font-size: 0.82rem; }
    .col-name   { font-weight: 600; }
    .col-symbol { font-weight: 700; direction: ltr; text-align: right; }

    /* Align numeric headers to match right-aligned content */
    .market-table th:nth-child(5),
    .market-table th:nth-child(6),
    .market-table th:nth-child(7),
    .market-table th:nth-child(8) { text-align: right; }

    /* Colors */
    .col-change.up,  .col-pre.up,  .col-ytd.up   { color: var(--up);   font-weight: 600; }
    .col-change.down,.col-pre.down,.col-ytd.down  { color: var(--down); font-weight: 600; }
    .col-change.neutral,.col-pre.neutral,.col-ytd.neutral { color: var(--text-muted); }

    /* Remove row button */
    .btn-remove-row {
      background: none;
      border: none;
      color: #ccc;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color var(--transition);
    }
    .btn-remove-row:hover { color: #e53935; }
    .btn-to-watch { background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 0.85rem; opacity: 0.4; transition: opacity 0.15s; }
    .btn-to-watch:hover { opacity: 1; }
    .col-btn { text-align: center; white-space: nowrap; }

    .market-cat-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.73rem;
      font-weight: 600;
      border: 1px solid;
      white-space: nowrap;
    }

    .market-footer {
      text-align: left;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
      padding: 0 2px;
    }

// Migrate existing localStorage data to Firestore (runs once)
async function migrateFromLocalStorage() {
  const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
  if (!raw) return;
  try {
    const items = JSON.parse(raw);
    if (!items || items.length === 0) return;
    const snap = await watchlistCol.limit(1).get();
    if (!snap.empty) return; // Firestore already has data
    const batch = db.batch();
    items.forEach(item => {
      const id = item.id || genId();
      batch.set(watchlistCol.doc(id), { ...item, id });
    });
    await batch.commit();
    localStorage.removeItem(CONFIG.STORAGE_KEY);
    console.log(`Migrated ${items.length} items to Firestore`);
  } catch (e) {
    console.warn('Migration skipped:', e.message);
  }
}

function initFirestoreListener() {
  watchlistCol.onSnapshot(snapshot => {
    const prevSymbols = new Set(STATE.watchlist.map(i => i.symbol));
    STATE.watchlist = [];
    snapshot.forEach(d => STATE.watchlist.push(d.data()));
    STATE.watchlist.sort((a, b) => new Date(a.addedAt) - new Date(b.addedAt));

    renderUnifiedTable();

    // Fetch data for symbols newly added from another device
    const newSymbols = STATE.watchlist
      .filter(i => !prevSymbols.has(i.symbol) && !STATE.marketData[i.symbol])
      .map(i => i.symbol);
    if (newSymbols.length > 0) {
      fetchAllSymbols(newSymbols).then(data => {
        if (data.length > 0) { updateMarketData(data); renderUnifiedTable(); }
      });
    }
  }, err => showError('Firebase: ' + err.message));
}

function genId() {
  return Math.random().toString(36).substr(2, 9) + Date.now().toString(36);

// Fetch quotes for multiple symbols via server.py /proxy/quotes (parallel, fast)
async function fetchAllSymbols(symbols) {
  if (symbols.length === 0) return [];
  try {
    const res = await fetch(
      `/proxy/quotes?symbols=${symbols.map(encodeURIComponent).join(',')}`,
      { signal: AbortSignal.timeout(20000) }
    );
    if (!res.ok) return [];
    const quotes = await res.json();
    return quotes.map(q => ({
      symbol:          q.symbol,
      name:            q.name || q.symbol,
      price:           q.price,
      change:          q.change,
      preMarketChange: q.preChange,
      preMarketPrice:  q.prePrice,
      currency:        q.currency || '',
      marketState:     '',
    }));
  } catch (e) {
    return [];
  }
}

async function validateSymbol(symbol) {
  try {
    const res = await fetch(
      `/proxy/quotes?symbols=${encodeURIComponent(symbol)}`,
      { signal: AbortSignal.timeout(15000) }
    );
    if (!res.ok) return { valid: false };
    const quotes = await res.json();
    const q = quotes[0];
    if (q && q.price != null) {
      return { valid: true, name: q.name || symbol, price: q.price, currency: q.currency || '' };
    }
    return { valid: false };
  } catch (e) {
    return { valid: false, error: true };
  }
}

/* ══════════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════════ */
function fmtPrice(price, currency) {
  if (price == null) return '—';
  const sym = currency === 'ILS' ? '₪' : (currency === 'USD' ? '$' : (currency || ''));
  return sym + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}

function fmtPct(val) {
  if (val == null) return '—';
  const sign = val >= 0 ? '+' : '';
  return sign + val.toFixed(2) + '%';
}

function changeClass(val) {
  if (val == null) return 'badge-neutral';
  return val >= 0 ? 'badge-up' : 'badge-down';
}

function changeArrow(val) {
  if (val == null) return '';
  return val >= 0 ? '▲' : '▼';
}

/* Build unified asset list: fixed market symbols + user watchlist */
function getAllAssets() {
  const marketSymbols = new Set(Object.keys(MARKET_META));
  const assets = [];

  // Fixed market symbols (always present)
  Object.keys(MARKET_META).forEach(symbol => {
    const meta = MARKET_META[symbol];
    const q = STATE.lastMarketQuotes.find(r => r.symbol === symbol) || {};
    const price = q.price ?? null;
    const prevClose = STATE.marketPrevClose[symbol] ?? null;
    const ytd = (prevClose != null && price != null)
      ? ((price - prevClose) / prevClose * 100)
      : null;
    assets.push({
      symbol,
      name: meta.name,
      category: meta.category,
      price,
      change: q.change ?? null,
      preChange: q.preChange ?? null,
      time: q.time ?? null,
      ytd,
      group: meta.group,
      isWatchlist: false,
    });
  });

  // User watchlist (skip duplicates already in market panel)
  // Sorted: by category order (CONFIG.CATEGORIES), then by symbol A-Z
  const watchlistAssets = [];
  STATE.watchlist.forEach(item => {
    if (marketSymbols.has(item.symbol)) return;
    const d = STATE.marketData[item.symbol] || {};
    watchlistAssets.push({
      symbol: item.symbol,
      name: d.name || item.symbol,
      category: item.category,
      price: d.price ?? null,
      change: d.change ?? null,
      preChange: d.preMarketChange ?? null,
      time: null,
      ytd: null,
      group: item.category === 'מעקב' ? 'watch' : item.category === 'מניות ישראל' ? 'il-stocks' : item.symbol.endsWith('=F') ? 'commodity' : 'watchlist',
      isWatchlist: true,
    });
  });
  watchlistAssets.sort((a, b) => {
    const ci = c => CONFIG.CATEGORIES.indexOf(c);
    if (ci(a.category) !== ci(b.category)) return ci(a.category) - ci(b.category);
    return a.symbol.localeCompare(b.symbol);
  });
  assets.push(...watchlistAssets);

  return assets;
}


function renderUnifiedTable() {
  if (STATE.activeFilters[0] === '__research__') return; // research mode manages its own table
  const tbody = document.getElementById('market-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  const assets      = sortAssets(getAllAssets());
  const activeFilters = STATE.activeFilters;
  updateSortIndicators();
  let count = 0;

  assets.forEach(asset => {
    if (activeFilters.length > 0 && !activeFilters.includes(asset.category)) return;
    count++;

    const change    = fmtMarketPct(asset.change);
    const pre       = fmtMarketPct(asset.preChange);
    const catColor  = CONFIG.CAT_COLOR[asset.category] || '#999';
    const timeTxt   = asset.time ? fmtMarketTime(asset.time) : '—';
    const ytdVal    = asset.ytd;
    const ytdCls    = ytdVal == null ? 'neutral' : (ytdVal >= 0 ? 'up' : 'down');
    const ytdTxt    = ytdVal != null ? ytdVal.toFixed(2) + '%' : '—';
    const removeBtn = asset.isWatchlist
      ? `<button class="btn-remove-row" data-symbol="${escHtml(asset.symbol)}" title="הסר">✕</button>` +
        (asset.category !== 'מעקב' ? `<button class="btn-to-watch" data-symbol="${escHtml(asset.symbol)}" title="העבר למעקב">👁️</button>` : '') +
        (asset.category === 'מעקב' ? `<button class="btn-to-watch btn-to-stocks" data-symbol="${escHtml(asset.symbol)}" title="העבר למניות חול">🏢</button>` : '')
      : '';

    const catShort = CONFIG.CAT_SHORT[asset.category] || asset.category;
    const catIcon  = CONFIG.CAT_ICON[asset.category] ? CONFIG.CAT_ICON[asset.category] + ' ' : '';
    const tr = document.createElement('tr');
    tr.className = `mrow mrow-${asset.group}`;
    tr.innerHTML = `
      <td class="col-time">${timeTxt}</td>
      <td class="col-symbol">
        <div>${escHtml(asset.symbol)}</div>
        <div class="col-name-sub">${escHtml(asset.name)}</div>
      </td>
      <td class="col-name">${escHtml(asset.name)}</td>
      <td class="col-cat"><span class="market-cat-badge" style="background:${catColor}22;color:${catColor};border-color:${catColor}55"><span class="cat-full">${catIcon}${escHtml(asset.category || '')}</span><span class="cat-short">${catIcon}${escHtml(catShort)}</span></span></td>
      <td class="col-price">${fmtMarketPrice(asset.price, asset.symbol)}</td>
      <td class="col-break"></td>
      <td class="col-change ${change.cls}">${change.text}</td>
      <td class="col-pre ${pre.cls}"><span class="pre-label">PRE </span>${pre.text}</td>
      <td class="col-ytd ${ytdCls}"><span class="ytd-label">Y2D </span>${ytdTxt}</td>
      <td class="col-btn">${removeBtn}</td>
    `;
    tbody.appendChild(tr);
  });

  if (count === 0) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:20px;color:#aaa">אין נכסים בקטגוריה הנבחרת</td></tr>`;
  }

  const el = document.getElementById('market-updated');
  if (el) el.textContent = new Date().toLocaleTimeString('he-IL');
}

function updateMarketData(dataArr) {
  dataArr.forEach(d => {
    const prev = STATE.marketData[d.symbol];
    STATE.marketData[d.symbol] = {
      name:           d.name,
      price:          d.price,
      change:         d.change,
      preMarketPrice: d.preMarketPrice,
      preMarketChange: d.preMarketChange,
      currency:       d.currency,
      marketState:    d.marketState,
    };
    if (prev && prev.price != null && d.price != null && prev.price !== d.price) {
      flashCard(d.symbol, d.price > prev.price ? 'flash-up' : 'flash-down');
    }
  });
}

function flashCard(symbol, cls) {
  const card = document.querySelector(`.stock-card[data-symbol="${symbol}"]`);
  if (!card) return;
  card.classList.remove('flash-up', 'flash-down');
  void card.offsetWidth; // reflow
  card.classList.add(cls);
  setTimeout(() => card.classList.remove(cls), 900);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════════════
   REFRESH & COUNTDOWN
══════════════════════════════════════════════════════════════ */
async function refreshQuotes() {
  if (STATE.activeFilters[0] === '__research__') {
    refreshMarket(); // רק שוק — מחקר לא מתרענן אוטומטית
    return;
  }
  refreshMarket(); // refresh market symbols (always)

  // Only fetch watchlist symbols that are currently visible
  const marketSymbols = new Set(Object.keys(MARKET_META));
  const visibleSymbols = STATE.watchlist
    .filter(i => {
      if (marketSymbols.has(i.symbol)) return false; // already in /proxy/market
      if (STATE.activeFilters.length === 0) return true;
      return STATE.activeFilters.some(f => f === i.category || f === '__all__');
    })
    .map(i => i.symbol);

  if (visibleSymbols.length === 0) { updateTimestamp(); return; }
  clearError();
  const data = await fetchAllSymbols(visibleSymbols);
  if (data.length === 0) {
    showError('שגיאת רשת — לא ניתן לעדכן נתונים. לחץ "רענן" לנסות שוב.');
    return;
  }
  updateMarketData(data);
  renderUnifiedTable();
  updateTimestamp();
}

function updateTimestamp() {
  const el = document.getElementById('refresh-time');
  if (!el) return;
  const now = new Date();
  el.textContent = `עודכן: ${now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
}

function startAutoRefresh() {
  stopAutoRefresh();
  STATE.countdown = 60;
  updateCountdownBar(60);

  STATE.countdownTimer = setInterval(() => {
    STATE.countdown = Math.max(0, STATE.countdown - 1);
    updateCountdownBar(STATE.countdown);
  }, 1000);

  STATE.refreshTimer = setInterval(async () => {
    STATE.countdown = 60;
    await refreshQuotes();
    STATE.countdown = 60;
    updateCountdownBar(60);
  }, CONFIG.REFRESH_MS);
}

function stopAutoRefresh() {
  clearInterval(STATE.refreshTimer);
  clearInterval(STATE.countdownTimer);
}

function updateCountdownBar(secs) {
  const fill = document.getElementById('countdown-fill');
  if (fill) fill.style.width = (secs / 60 * 100) + '%';
}

let _validSymbolData = null;

function openModal() {
  _validSymbolData = null;
  document.getElementById('input-symbol').value = '';
  document.getElementById('input-category').value = 'מניות חול';
  setValidationMsg('', '');
  document.getElementById('btn-save').disabled = true;
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('input-symbol').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function setValidationMsg(type, html) {
  const el = document.getElementById('validation-msg');
  el.className = `validation-msg ${type}`;
  el.innerHTML = html;
}

let _validateDebounce = null;

document.getElementById('input-symbol').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
  _validSymbolData = null;
  document.getElementById('btn-save').disabled = true;

  const sym = this.value.trim();
  if (!sym) { setValidationMsg('empty', ''); return; }

  clearTimeout(_validateDebounce);
  setValidationMsg('checking', '<span class="spinner"></span> מאמת סמל...');

  _validateDebounce = setTimeout(async () => {
    const result = await validateSymbol(sym);
    if (result.valid) {
      _validSymbolData = result;
      setValidationMsg('valid', `✓ ${escHtml(result.name)} — ${fmtPrice(result.price, result.currency)}`);
      document.getElementById('btn-save').disabled = false;
    } else if (result.error) {
      setValidationMsg('invalid', '⚠️ שגיאת רשת — לא ניתן לאמת. ניתן לשמור בכל זאת.');
      // Allow save despite network error (user's risk)
      _validSymbolData = { valid: true, name: sym };
      document.getElementById('btn-save').disabled = false;
    } else {
      setValidationMsg('invalid', '✗ הסמל לא נמצא. בדוק את האיות.');
    }
  }, 700);
});

document.getElementById('btn-save').addEventListener('click', handleSave);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-open-modal').addEventListener('click', openModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('input-symbol').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !document.getElementById('btn-save').disabled) handleSave();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

async function handleSave() {
  const symbol = document.getElementById('input-symbol').value.trim().toUpperCase();
  const category = document.getElementById('input-category').value;
  if (!symbol || !_validSymbolData) return;
  if (!category) { setValidationMsg('invalid', '⚠️ יש לבחור קטגוריה.'); return; }

  // Check for duplicates
  if (STATE.watchlist.some(i => i.symbol === symbol)) {
    setValidationMsg('invalid', '⚠️ הסמל כבר קיים ברשימה.');
    return;
  }

  const newItem = { id: genId(), symbol, category, addedAt: new Date().toISOString() };
  closeModal();
  await addItemToFirestore(newItem); // onSnapshot will update STATE.watchlist

  // Fetch data for new symbol immediately
  try {
    const quotes = await fetchAllSymbols([symbol]);
    if (quotes.length > 0) { updateMarketData(quotes); renderUnifiedTable(); }
  } catch (e) { /* show anyway */ }
}

/* ══════════════════════════════════════════════════════════════
   REMOVE STOCK — event delegation on unified table
══════════════════════════════════════════════════════════════ */
document.getElementById('market-tbody').addEventListener('click', function(e) {
  // Move to מניות חול (from מעקב)
  const stocksBtn = e.target.closest('.btn-to-stocks');
  if (stocksBtn) {
    const symbol = stocksBtn.dataset.symbol;
    if (!confirm(`להעביר את ${symbol} למניות חול?`)) return;
    const item = STATE.watchlist.find(i => i.symbol === symbol);
    if (item) watchlistCol.doc(item.id).update({ category: 'מניות חול' });
    return;
  }
  // Move to מעקב
  const watchBtn = e.target.closest('.btn-to-watch:not(.btn-to-stocks)');
  if (watchBtn) {
    const symbol = watchBtn.dataset.symbol;
    if (!confirm(`להעביר את ${symbol} לרשימת מעקב?`)) return;
    const item = STATE.watchlist.find(i => i.symbol === symbol);
    if (item) watchlistCol.doc(item.id).update({ category: 'מעקב' });
    return;
  }
  // Remove
  const btn = e.target.closest('.btn-remove-row');
  if (!btn) return;
  const symbol = btn.dataset.symbol;
  if (!symbol) return;
  if (!confirm(`הסר את ${symbol} מהרשימה?`)) return;
  const item = STATE.watchlist.find(i => i.symbol === symbol);
  if (item) removeItemFromFirestore(item.id);
  delete STATE.marketData[symbol];
});

function fmtMarketPrice(price, symbol) {
  if (price == null) return '—';
  const isCrypto = symbol === 'BTC-USD' || symbol === 'ETH-USD';
  if (isCrypto) return '$' + price.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (symbol.endsWith('ILS=X')) return '₪' + price.toLocaleString('en-US', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
  return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtMarketPct(val) {
  if (val == null) return { text: '—', cls: 'neutral' };
  return {
    text: val.toFixed(2) + '%',
    cls:  val >= 0 ? 'up' : 'down',
  };
}

function fmtMarketTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  const now = new Date();
  const isToday = d.getFullYear() === now.getFullYear()
               && d.getMonth()    === now.getMonth()
               && d.getDate()     === now.getDate();
  const timeStr = d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  return isToday ? timeStr : 'אמש ' + timeStr;
}

function renderMarketTable(quotes) {
  const tbody = document.getElementById('market-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  const activeFilters = STATE.activeFilters;

  quotes.forEach(q => {
    const meta = MARKET_META[q.symbol] || { name: q.symbol, group: 'us', category: '' };

    // Skip row if its category is filtered out
    if (activeFilters.length > 0 && meta.category && !activeFilters.includes(meta.category)) return;

    const change    = fmtMarketPct(q.change);
    const pre       = fmtMarketPct(q.preChange);
    const catColor  = CONFIG.CAT_COLOR[meta.category] || '#999';

    const tr = document.createElement('tr');
    tr.className = `mrow mrow-${meta.group}`;
    tr.dataset.symbol = q.symbol;
    tr.dataset.name   = meta.name;
    tr.innerHTML = `
      <td class="col-time">${fmtMarketTime(q.time)}</td>
      <td class="col-name">${escHtml(meta.name)}</td>
      <td><span class="market-cat-badge" style="background:${catColor}22;color:${catColor};border-color:${catColor}55">${escHtml(meta.category || '')}</span></td>
      <td class="col-price">${fmtMarketPrice(q.price, q.symbol)}</td>
      <td class="col-change ${change.cls}">${change.text}</td>
      <td class="col-pre ${pre.cls}">${pre.text}</td>
      <td class="col-btn" style="color:var(--text-muted);font-size:0.85rem;opacity:0.5">📈</td>
    `;
    tbody.appendChild(tr);
  });

  const el = document.getElementById('market-updated');
  if (el) el.textContent = new Date().toLocaleTimeString('he-IL');
}

// Fetch Dec-31 prevClose for one market symbol (for YTD calc). Called once per session.
async function fetchMarketSymbolYTD(symbol) {
  try {
    const res = await fetch(`/proxy/market/chart?symbol=${encodeURIComponent(symbol)}`,
      { signal: AbortSignal.timeout(10000) });
    if (!res.ok) return;
    const data = await res.json();
    if (data.prevClose != null) STATE.marketPrevClose[symbol] = data.prevClose;
  } catch (e) {}
}

async function refreshMarket() {
  try {
    const res = await fetch('/proxy/market', { signal: AbortSignal.timeout(20000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const quotes = await res.json();
    STATE.lastMarketQuotes = quotes;
    renderUnifiedTable();

    // Fetch YTD prevClose for symbols not yet cached (once per session)
    const needYTD = Object.keys(MARKET_META).filter(s => STATE.marketPrevClose[s] == null);
    if (needYTD.length > 0) {
      await Promise.allSettled(needYTD.map(fetchMarketSymbolYTD));
      renderUnifiedTable(); // re-render now that YTD is available
    }
  } catch (e) {
    const tbody = document.getElementById('market-tbody');
    if (tbody && STATE.lastMarketQuotes.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:14px;color:#e53935;font-size:0.85rem">
        ⚠️ שגיאה בטעינת נתוני שוק — הפעל מחדש את start.bat<br>
        <small style="color:#999">${e.message}</small>
      </td></tr>`;
    }
  }
}

function sortAssets(assets) {
  const { col, dir } = STATE.sort;
  if (!col) return assets;
  const m = dir === 'asc' ? 1 : -1;
  return [...assets].sort((a, b) => {
    let av, bv;
    switch (col) {
      case 'time':     av = a.time ?? 0;                              bv = b.time ?? 0;                              break;
      case 'symbol':   av = a.symbol || '';                           bv = b.symbol || '';                           break;
      case 'name':     av = a.name || '';                             bv = b.name || '';                             break;
      case 'category': av = CONFIG.CATEGORIES.indexOf(a.category);   bv = CONFIG.CATEGORIES.indexOf(b.category);   break;
      case 'price':    av = a.price ?? -Infinity;                     bv = b.price ?? -Infinity;                     break;
      case 'change':   av = a.change ?? -Infinity;                    bv = b.change ?? -Infinity;                    break;
      case 'pre':      av = a.preChange ?? -Infinity;                 bv = b.preChange ?? -Infinity;                 break;
      case 'ytd':      av = a.ytd ?? -Infinity;                       bv = b.ytd ?? -Infinity;                       break;
      default: return 0;
    }
    if (typeof av === 'string') return m * av.localeCompare(bv);
    return m * (av - bv);
  });
}

function initSortHeaders() {
  document.querySelectorAll('.market-table th[data-col]').forEach(th => {

}

}

══════════════════════════════════════════════════════════════ */
let _chartInstance = null;
let _chartSymbol   = null;
let _chartName     = null;

function closeChartModal() {
  document.getElementById('chart-overlay').classList.add('hidden');
  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
}

async function openChartModal(symbol, name, interval, range) {
  _chartSymbol = symbol;
  _chartName   = name;
  interval = interval || '5m';
  range    = range    || '1d';

  document.getElementById('chart-overlay').classList.remove('hidden');
  document.getElementById('chart-symbol').textContent = symbol;
  document.getElementById('chart-name').textContent = name && name !== symbol ? name : '';
  const _q = STATE.lastMarketQuotes.find(r => r.symbol === symbol) || {};
  const _d = STATE.marketData[symbol] || {};
  const _price = _q.price ?? _d.price ?? null;
  const _change = _q.change ?? _d.change ?? null;
  const _currency = _d.currency || '';
  const _priceEl = document.getElementById('chart-current-price');
  _priceEl.textContent = _price != null ? fmtPrice(_price, _currency) : '';
  _priceEl.style.color = _change == null ? '' : _change >= 0 ? 'var(--up)' : 'var(--down)';
  document.getElementById('chart-stats').innerHTML = '<span class="chart-stat"><span class="spinner"></span> טוען...</span>';

  // Sync active button
  document.querySelectorAll('.chart-range-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.interval === interval && btn.dataset.range === range);
  });

  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }

  try {
    // Build list of param candidates: primary + fallbacks for short intervals
    const paramsList = [`?interval=${interval}&range=${range}`];
    if (interval === '5m')  paramsList.push('?interval=1h&range=5d');
    if (interval === '15m') paramsList.push('?interval=1h&range=5d');

    let data = null;
    let usedParams = paramsList[0];
    for (const p of paramsList) {
      try {
        const res = await fetch(`/api/chart/${encodeURIComponent(symbol)}${p}`,
          { signal: AbortSignal.timeout(10000) });
        if (res.ok) { data = await res.json(); usedParams = p; break; }
      } catch(e) {}
    }
    // No external proxy fallback for chart — server.py is the only path (avoids CORS errors)

    const result = data?.chart?.result?.[0];
    if (!result) throw new Error('אין נתונים');

    const timestamps = result.timestamp || [];
    const closes = result.indicators?.quote?.[0]?.close || [];
    let pairs = timestamps.map((t, i) => ({ t, c: closes[i] })).filter(p => p.c != null);
    if (pairs.length === 0) throw new Error('אין נקודות נתונים');

    // If 1D was requested but fallback returned multi-day data: filter to today's bars only
    const isFallback = (range === '1d' && !usedParams.includes('range=1d'));
    if (isFallback) {
      const todayStartTs = new Date(new Date().toISOString().slice(0, 10)).getTime() / 1000;
      const todayPairs = pairs.filter(p => p.t >= todayStartTs);
      if (todayPairs.length > 0) pairs = todayPairs;
    }

    const isIntraday = (range === '1d' || range === '5d');
    const labels = pairs.map(p => {
      const d = new Date(p.t * 1000);
      if (isIntraday) return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      return `${d.getDate()}.${d.getMonth() + 1}`;
    });
    const values    = pairs.map(p => p.c);
    const minVal    = Math.min(...values);
    const maxVal    = Math.max(...values);
    const last      = values[values.length - 1];
    // For 1D: find yesterday's last bar as base (accurate even with fallback data)
    let first;
    if (range === '1d') {
      const todayStartTs = new Date(new Date().toISOString().slice(0, 10)).getTime() / 1000;
      const allPairs = timestamps.map((t, i) => ({ t, c: closes[i] })).filter(p => p.c != null);
      const prevBar  = allPairs.slice().reverse().find(p => p.t < todayStartTs);
      first = prevBar?.c ?? result.meta?.chartPreviousClose ?? values[0];
    } else {
      first = values[0];
    }
    const chgPct    = ((last - first) / first * 100);
    const isUp      = chgPct >= 0;
    const lineColor = isUp ? '#1b8a3c' : '#c62828';
    const fmt = v => v.toLocaleString('en-US', { maximumFractionDigits: 2 });

    const rangeLabel = { '1d':'היום', '5d':'5D', '1mo':'1M', 'ytd':'YTD', '1y':'1Y' }[range] || range;
    const hiLoLabel  = range === '1y' ? '52W' : rangeLabel;

    document.getElementById('chart-stats').innerHTML = `
      <span class="chart-stat">גבוה: <strong style="color:#1b8a3c">${fmt(maxVal)}</strong></span>
      <span class="chart-stat">נמוך: <strong style="color:#c62828">${fmt(minVal)}</strong></span>
      <span class="chart-stat">${rangeLabel}: <strong style="color:${lineColor}">${isUp?'+':''}${chgPct.toFixed(2)}%</strong></span>
    `;

    const isDark    = document.body.classList.contains('dark');
    const tickColor = isDark ? '#9e9e9e' : '#666';
    const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
    const maxTicks  = isIntraday ? 6 : 8;

    // MA150 — only for ytd/1y ranges
    const maPeriod = 150;
    let ma150 = null;
    if ((range === 'ytd' || range === '1y') && values.length >= maPeriod) {
      ma150 = values.map((_, i) => {
        if (i < maPeriod - 1) return null;
        const slice = values.slice(i - maPeriod + 1, i + 1);
        return slice.reduce((a, b) => a + b, 0) / maPeriod;
      });
    }

    const datasets = [{
      data: values,
      borderColor: lineColor,
      backgroundColor: lineColor + '22',
      borderWidth: 2,
      pointRadius: 0,
      fill: true,
      tension: 0.3,
    }];
    if (ma150) datasets.push({
      data: ma150,
      borderColor: '#ff9800',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [4, 3],
      pointRadius: 0,
      fill: false,
      tension: 0.3,
      label: 'MA150',
    });

    const ctx = document.getElementById('chart-canvas').getContext('2d');
    _chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { right: 10 } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.parsed.y) } }
        },
        scales: {
          x: { ticks: { color: tickColor, maxTicksLimit: maxTicks, maxRotation: 0 }, grid: { color: gridColor } },
          y: { position: 'right', ticks: { color: tickColor, maxTicksLimit: 5, font: { size: 10 }, callback: v => v >= 1000 ? (v/1000).toFixed(1)+'K' : parseFloat(v.toPrecision(6)) }, grid: { color: gridColor } }
        },
        interaction: { mode: 'index', intersect: false },
      }
    });
  } catch(e) {
    document.getElementById('chart-stats').innerHTML = `<span style="color:#e53935">שגיאה: ${escHtml(e.message)}</span>`;
  }
}

async function loadAndRenderResearch() {

  // Desktop thead + spinner
  if (thead) {
    thead.innerHTML = `<tr>
      <th class="col-research-sym">סמל / שם</th>
      <th class="col-price">שער</th>
      <th class="col-research-ma">MA150</th>
      <th class="col-research-earn">דוח קרוב</th>
      <th class="col-research-news">חדשות (48 שע')</th>

      </th>
    </tr>`;
    document.getElementById('btn-ai-all')?.addEventListener('click', () => fetchAllAI(false));
    document.getElementById('btn-ai-refresh')?.addEventListener('click', () => fetchAllAI(true));
  }
  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:#aaa"><span class="spinner"></span> טוען...</td></tr>`;
  cards.innerHTML = `<div style="text-align:center;padding:24px;color:#aaa"><span class="spinner"></span> טוען נתוני מחקר...</div>`;

  if (symbols.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:#aaa">אין מניות חול או מעקב ברשימה</td></tr>`;
    cards.innerHTML = `<div style="text-align:center;padding:24px;color:#aaa">אין מניות חול או מעקב ברשימה</div>`;
    return;
  }

  try {
    const [res] = await Promise.all([
      fetch(`/proxy/research?symbols=${symbols.map(encodeURIComponent).join(',')}`,
            { signal: AbortSignal.timeout(30000) }),
      db.collection('ai_summaries').get().then(snap => {
        snap.forEach(d => { if (symbols.includes(d.id)) STATE.aiSummaries[d.id] = d.data(); });
      }).catch(() => {})
    ]);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    data.forEach(d => { STATE.researchData[d.symbol] = d; });
    renderResearchTable(data);
  } catch(e) {
    const msg = `שגיאה: ${escHtml(e.message)}`;
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;color:#e53935">${msg}</td></tr>`;
    cards.innerHTML = `<div style="text-align:center;padding:20px;color:#e53935">${msg}</div>`;
  }
}

function _buildResearchBadges(d) {
  // MA150
  let maBadge = '—';
  if (d.ma150 != null) {
    const sign = d.ma150Pct >= 0 ? '+' : '';
    maBadge = d.aboveMa150
      ? `<span class="badge-ma-above">▲ מעל MA150 ${sign}${d.ma150Pct?.toFixed(1)}%</span>`
      : `<span class="badge-ma-below">▼ מתחת MA150 ${sign}${d.ma150Pct?.toFixed(1)}%</span>`;
  }
  // Earnings
  let earnBadge = '—';
  if (d.earningsDate) {
    const days = d.daysToEarnings;
    const dateStr = new Date(d.earningsDate * 1000).toLocaleDateString('he-IL', { day: 'numeric', month: 'numeric' });
    const timeStr = d.earningsTime === 'time-pre-market' ? ' לפני פתיחה' :
                    d.earningsTime === 'time-after-hours' ? ' אחרי סגירה' : '';
    earnBadge = days <= 2
      ? `<span class="badge-earnings">🔔 דוח: ${dateStr}${timeStr} (${days} ימים!)</span>`
      : `<span style="font-size:0.82rem">📅 דוח: <strong>${dateStr}</strong><span style="color:var(--text-muted)">${timeStr} · ${days} ימים</span></span>`;
  }
  // News
  let newsHtml = '';
  if (d.news && d.news.length > 0)
    newsHtml = d.news.map(n => `<span class="research-news-title">• ${escHtml(n.title)}</span>`).join('');
  return { maBadge, earnBadge, newsHtml };
}

function renderResearchTable(dataArr) {
  const sorted = [...dataArr].sort((a, b) => {
    const aHas = a.daysToEarnings != null;
    const bHas = b.daysToEarnings != null;
    if (aHas && bHas) return a.daysToEarnings - b.daysToEarnings;
    if (aHas) return -1;
    if (bHas) return 1;
    return a.symbol.localeCompare(b.symbol);
  });
  _renderResearchTableDesktop(sorted);
  _renderResearchCards(sorted);
  updateJumpBar(sorted.map(d => d.symbol));
}

function _renderResearchTableDesktop(sorted) {
  const tbody = document.getElementById('market-tbody');
  tbody.innerHTML = '';
  if (sorted.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;color:#aaa">אין נתוני מחקר</td></tr>`;
    return;
  }
  sorted.forEach(d => {
    const mktD = STATE.marketData[d.symbol] || {};
    const price = mktD.price ?? d.price;
    const name  = mktD.name || d.symbol;
    const { maBadge, earnBadge, newsHtml } = _buildResearchBadges(d);
    const hasSummary = !!STATE.aiSummaries[d.symbol];

    const tr = document.createElement('tr');
    tr.id = 'rrow-' + d.symbol;
    if (d.daysToEarnings != null && d.daysToEarnings <= 2) tr.className = 'research-earnings-soon';
    tr.innerHTML = `
      <td class="col-research-sym" style="cursor:pointer">
        <strong style="direction:ltr;display:block">${escHtml(d.symbol)}</strong>
        <span class="col-research-name">${escHtml(name)}</span>
      </td>
      <td class="col-price" style="direction:ltr">${price != null ? fmtPrice(price, 'USD') : '—'}</td>
      <td class="col-research-ma">${maBadge}</td>
      <td class="col-research-earn">${earnBadge}</td>
      <td class="col-research-news">${newsHtml || '—'}</td>
      <td class="col-research-ai" style="text-align:center;white-space:nowrap">
        <button class="btn-ai" data-symbol="${escHtml(d.symbol)}" title="סיכום AI">🤖</button>
        ${hasSummary ? `<button class="btn-ai-close-desktop" data-symbol="${escHtml(d.symbol)}" title="סגור">✕</button>` : ''}
      </td>`;
    tr.addEventListener('click', e => { if (!e.target.closest('.btn-ai')) openChartModal(d.symbol, name); });
    tbody.appendChild(tr);

    if (hasSummary) {
      const saved = STATE.aiSummaries[d.symbol];
      const dateStr = new Date(saved.updatedAt).toLocaleDateString('he-IL', { day: 'numeric', month: 'numeric' });
      const aiRow = document.createElement('tr');
      aiRow.className = 'ai-summary-row';
      aiRow.dataset.aiSymbol = d.symbol;
      aiRow.innerHTML = `<td colspan="7" class="ai-summary-cell">
        <span class="ai-label">🤖 ${escHtml(d.symbol)}</span><span class="ai-date">· ${dateStr}</span>
        ${escHtml(saved.summary)}</td>`;
      tbody.appendChild(aiRow);
    }
  });
}

function _renderResearchCards(sorted) {
  const cards = document.getElementById('research-cards');
  cards.innerHTML = '';

  // "הכל" button at top
  const allBtn = document.createElement('button');
  allBtn.className = 'rc-ai-all';
  allBtn.id = 'btn-ai-all';
  allBtn.textContent = '🤖 AI לכולם';
  allBtn.title = 'סיכום AI למניות חסרות';
  allBtn.addEventListener('click', () => fetchAllAI(false));
  cards.appendChild(allBtn);

  const refreshBtn = document.createElement('button');
  refreshBtn.className = 'rc-ai-all';
  refreshBtn.id = 'btn-ai-refresh';
  refreshBtn.textContent = '🔄 עדכן הכל';
  refreshBtn.title = 'רענן סיכום AI לכולם מחדש';
  refreshBtn.addEventListener('click', () => fetchAllAI(true));
  cards.appendChild(refreshBtn);

  if (sorted.length === 0) {
    cards.innerHTML += `<div style="text-align:center;padding:20px;color:#aaa">אין נתוני מחקר</div>`;
    return;
  }

  sorted.forEach(d => {
    const mktD = STATE.marketData[d.symbol] || {};
    const price = mktD.price ?? d.price;
    const name  = mktD.name || d.symbol;
    const { maBadge, earnBadge } = _buildResearchBadges(d);
    const hasSummary = !!STATE.aiSummaries[d.symbol];
    const saved = STATE.aiSummaries[d.symbol];

    const card = document.createElement('div');
    card.id = 'rrow-' + d.symbol;
    card.className = 'rc' + (d.daysToEarnings != null && d.daysToEarnings <= 2 ? ' rc-earnings-soon' : '');
    card.dataset.symbol = d.symbol;

    const aiDateHtml = saved
      ? `<span class="rc-ai-date">· ${new Date(saved.updatedAt).toLocaleDateString('he-IL', { day: 'numeric', month: 'numeric' })}</span>` : '';
    const aiSummaryHtml = saved
      ? `<div class="rc-ai-summary"><strong>🤖 ${escHtml(d.symbol)}</strong> ${aiDateHtml}<br>${escHtml(saved.summary)}</div>` : '';

    card.innerHTML = `
      <div class="rc-head">
        <span class="rc-symbol">${escHtml(d.symbol)}</span>
        <span class="rc-name">${escHtml(name)}</span>
        <span class="rc-price">${price != null ? fmtPrice(price, 'USD') : '—'}</span>
      </div>
      <div class="rc-badges">
        ${maBadge !== '—' ? maBadge : ''}
        ${earnBadge !== '—' ? earnBadge : ''}
      </div>
      <div class="rc-ai-row">
        <button class="btn-ai" data-symbol="${escHtml(d.symbol)}">🤖 AI</button>
        ${hasSummary ? `<button class="btn-ai-close" data-symbol="${escHtml(d.symbol)}" title="סגור AI">✕</button>` : ''}
      </div>
      ${aiSummaryHtml}`;

    card.querySelector('.rc-head').addEventListener('click', () => openChartModal(d.symbol, name));
    cards.appendChild(card);
  });
}

async function saveAISummary(symbol, summary) {
  const rec = { summary, updatedAt: new Date().toISOString() };
  STATE.aiSummaries[symbol] = rec;
  try { await db.collection('ai_summaries').doc(symbol).set(rec); } catch(e) { /* non-critical */ }
}

async function askAI(symbol, btn) {
  const dateStr = new Date().toLocaleDateString('he-IL', { day: 'numeric', month: 'numeric' });

  // Detect context by parent element
  const card = btn.closest('.rc');
  if (card) {
    // Mobile card mode — always fetches / re-fetches
    btn.disabled = true; btn.textContent = '⏳';
    try {
      const res = await fetch(`/proxy/ai-summary?symbol=${encodeURIComponent(symbol)}`,
                              { signal: AbortSignal.timeout(25000) });
      const data = await res.json();
      if (data.error === 'no_key') throw new Error('מפתח OPENAI_API_KEY לא הוגדר');
      if (data.error) throw new Error(data.error);
      await saveAISummary(symbol, data.summary);
      let div = card.querySelector('.rc-ai-summary');
      if (!div) {
        div = document.createElement('div');
        div.className = 'rc-ai-summary';
        card.appendChild(div);
        // Add close button if not already there
        const aiRow = card.querySelector('.rc-ai-row');
        if (aiRow && !aiRow.querySelector('.btn-ai-close')) {
          const closeBtn = document.createElement('button');
          closeBtn.className = 'btn-ai-close';
          closeBtn.dataset.symbol = symbol;
          closeBtn.title = 'סגור AI';
          closeBtn.textContent = '✕';
          aiRow.appendChild(closeBtn);
        }
      }
      div.innerHTML = `<strong>🤖 ${escHtml(symbol)}</strong> <span class="rc-ai-date">· ${dateStr}</span><br>${escHtml(data.summary)}`;
      div.style.display = '';
    } catch(e) {
      btn.textContent = '⚠️';
      btn.title = e.message;
      alert('שגיאת AI: ' + e.message);
      setTimeout(() => { btn.textContent = '🤖 AI'; btn.title = ''; btn.disabled = false; }, 4000);
      btn.disabled = false; return;
    }
    btn.textContent = '🤖 AI';
    btn.disabled = false;
    return;
  }

  // Desktop table mode — always fetch fresh summary
  const tr = btn.closest('tr');
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const res = await fetch(`/proxy/ai-summary?symbol=${encodeURIComponent(symbol)}`,
                            { signal: AbortSignal.timeout(25000) });
    const data = await res.json();
    if (data.error === 'no_key') throw new Error('מפתח OPENAI_API_KEY לא הוגדר');
    if (data.error) throw new Error(data.error);
    await saveAISummary(symbol, data.summary);
    // Remove existing AI row if any
    const existing = tr.nextElementSibling;
    if (existing && existing.classList.contains('ai-summary-row') && existing.dataset.aiSymbol === symbol) {
      existing.remove();
    }
    const aiRow = document.createElement('tr');
    aiRow.className = 'ai-summary-row';
    aiRow.dataset.aiSymbol = symbol;
    aiRow.innerHTML = `<td colspan="7" class="ai-summary-cell"><span class="ai-label">🤖 ${escHtml(symbol)}</span><span class="ai-date">· ${dateStr}</span> ${escHtml(data.summary)}</td>`;
    tr.after(aiRow);
    // Ensure close button exists
    const td = tr.querySelector('.col-research-ai');
    if (td && !td.querySelector('.btn-ai-close-desktop')) {
      const cb = document.createElement('button');
      cb.className = 'btn-ai-close-desktop';
      cb.dataset.symbol = symbol;
      cb.title = 'סגור';
      cb.textContent = '✕';
      td.appendChild(cb);
    }
  } catch(e) {
    btn.textContent = '⚠️';
    btn.title = e.message;
    alert('שגיאת AI: ' + e.message);
    setTimeout(() => { btn.textContent = '🤖'; btn.title = 'סיכום AI'; btn.disabled = false; }, 4000);
    btn.disabled = false; return;
  }
  btn.textContent = '🤖';
  btn.disabled = false;
}

async function fetchAllAI(forceAll = false) {
  const btn = document.getElementById('btn-ai-all');
  if (!btn) return;
  const allSymbols = STATE.watchlist
    .filter(i => i.category === 'מניות חול' || i.category === 'מעקב')
    .map(i => i.symbol);
  const toFetch = forceAll ? allSymbols : allSymbols.filter(s => !STATE.aiSummaries[s]);
  if (toFetch.length === 0) {
    btn.textContent = '✓ הכל קיים';
    setTimeout(() => { btn.textContent = '🤖 הכל'; }, 3000);
    return;
  }
  btn.disabled = true;
  btn.textContent = `⏳ 0/${toFetch.length}`;
  try {
    const res = await fetch(`/proxy/ai-summary-bulk?symbols=${toFetch.map(encodeURIComponent).join(',')}`,
                            { signal: AbortSignal.timeout(toFetch.length * 18000) });
    const results = await res.json();
    if (!Array.isArray(results)) {
      if (results.error === 'no_key') throw new Error('מפתח OPENAI_API_KEY לא הוגדר בשרת');
      throw new Error(JSON.stringify(results));
    }
    let done = 0;
    for (const item of results) {
      if (item.summary) { await saveAISummary(item.symbol, item.summary); done++; }
      btn.textContent = `⏳ ${done}/${toFetch.length}`;
    }
    // Re-render with fresh summaries
    const cached = allSymbols.map(s => STATE.researchData[s]).filter(Boolean);
    renderResearchTable(cached);
  } catch(e) {
    btn.textContent = '⚠️';
    btn.title = e.message;
    setTimeout(() => { btn.textContent = '🤖 הכל'; btn.disabled = false; }, 4000);
    btn.disabled = false;
    return;
  }
  btn.disabled = false;
  btn.textContent = '🤖 הכל';
}

function restoreStandardThead() {
  document.querySelector('.panel-market')?.classList.remove('research-mode-active');
  document.querySelector('.market-table')?.classList.remove('research-mode');
  const cards = document.getElementById('research-cards');
  if (cards) cards.innerHTML = '';
  updateJumpBar(null);
  const thead = document.getElementById('market-thead');
  if (thead) thead.innerHTML = `
    <tr>
      <th class="col-time" data-col="time">זמן</th>
      <th class="col-symbol" data-col="symbol">סמל</th>
      <th class="col-name" data-col="name">שם</th>
      <th class="col-cat" data-col="category">קטגוריה</th>
      <th class="col-price" data-col="price">שער</th>
      <th class="col-break"></th>
      <th class="col-change" data-col="change">% יום</th>
      <th class="col-pre" data-col="pre">טרום</th>
      <th class="col-ytd" data-col="ytd">Ytd</th>
      <th class="col-btn"></th>
    </tr>`;
  initSortHeaders();
}

function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  if (!bar) return;
  bar.innerHTML = '';

  const label = document.createElement('span');
  label.className = 'filter-label';
  label.textContent = 'סינון:';
  bar.appendChild(label);

  const sel = document.createElement('select');
  sel.className = 'filter-select';

  const allActive = CONFIG.CATEGORIES.every(c => STATE.activeFilters.includes(c));
  const optAll = document.createElement('option');
  optAll.value = '__all__';
  optAll.textContent = '📋 הכל';
  if (allActive) optAll.selected = true;
  sel.appendChild(optAll);

  CONFIG.CATEGORIES.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = '\u200F' + CONFIG.CAT_ICON[cat] + ' ' + cat;
    if (!allActive && STATE.activeFilters.includes(cat)) opt.selected = true;
    sel.appendChild(opt);
  });

  // Research option
  const resOpt = document.createElement('option');
  resOpt.value = '__research__';
  resOpt.textContent = '🔬 מחקר';
  if (STATE.activeFilters[0] === '__research__') resOpt.selected = true;
  sel.appendChild(resOpt);

  sel.addEventListener('change', () => {
    if (sel.value === '__research__') {
      STATE.activeFilters = ['__research__'];
      loadAndRenderResearch();
      return;
    }
    // Restore standard thead if coming from research mode
    if (STATE.activeFilters[0] === '__research__') restoreStandardThead();
    STATE.activeFilters = sel.value === '__all__' ? [...CONFIG.CATEGORIES] : [sel.value];
    renderUnifiedTable();
    // Fetch data for newly visible symbols that haven't been loaded yet
    const marketSymbols = new Set(Object.keys(MARKET_META));
    const missing = STATE.watchlist.filter(i => {
      if (marketSymbols.has(i.symbol)) return false;
      if (!STATE.activeFilters.includes(i.category)) return false;
      return !STATE.marketData[i.symbol]?.price;
    }).map(i => i.symbol);
    if (missing.length > 0) {
      fetchAllSymbols(missing).then(data => {
        if (data.length > 0) { updateMarketData(data); renderUnifiedTable(); }
      });
    }
  });

  bar.appendChild(sel);
}

function updateJumpBar(symbols) {
  const jumpBar = document.getElementById('jump-bar');
  const sel     = document.getElementById('jump-select');
  if (!jumpBar || !sel) return;
  if (!symbols || symbols.length === 0) { jumpBar.style.display = 'none'; return; }

  sel.innerHTML = '<option value="">בחר</option>';
  [...symbols].sort((a, b) => a.localeCompare(b)).forEach(sym => {
    const opt = document.createElement('option');
    opt.value = sym;
    opt.textContent = sym;
    sel.appendChild(opt);
  });
  jumpBar.style.display = 'flex';

  sel.onchange = () => {
    const sym = sel.value;
    if (!sym) return;
    sel.value = '';

    const cards     = document.getElementById('research-cards');
    const tableWrap = document.getElementById('market-table-wrap');
    const isMobile  = cards && getComputedStyle(cards).display !== 'none';

    // On mobile search inside #research-cards, on desktop search in table — avoid duplicate id collision
    const el = isMobile
      ? cards.querySelector('#rrow-' + sym)
      : document.getElementById('rrow-' + sym);
    if (!el) return;

    if (isMobile) {
      const cRect = cards.getBoundingClientRect();
      const eRect = el.getBoundingClientRect();
      cards.scrollTop = cards.scrollTop + (eRect.top - cRect.top) - 8;
    } else {
      const thead  = tableWrap.querySelector('thead');
      const theadH = thead ? thead.getBoundingClientRect().height : 0;
      const cRect  = tableWrap.getBoundingClientRect();
      const eRect  = el.getBoundingClientRect();
      tableWrap.scrollTo({
        top: tableWrap.scrollTop + (eRect.top - cRect.top) - theadH - 4,
        behavior: 'smooth'
      });
    }

    el.style.outline = '3px solid #1976d2';
    setTimeout(() => { el.style.outline = ''; }, 2000);
  };
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
async function init() {
  initDarkMode();
  initSortHeaders();
  await migrateFromLocalStorage(); // one-time localStorage→Firestore migration
  initFirestoreListener();         // real-time sync + data fetch handled inside listener
  renderFilterBar();
  renderUnifiedTable();
  updateTimestamp();
  refreshMarket();
  startAutoRefresh();
}

init();
</script>
